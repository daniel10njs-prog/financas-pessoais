<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Finanças Pessoais</title>
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --verde: #22c55e; --vermelho: #ef4444; --amarelo: #f59e0b; --azul: #3b82f6; --roxo: #a855f7;
  --bg: #0f172a; --card: #1e293b; --card2: #253047; --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; max-width: 480px; margin: 0 auto; padding-bottom: 24px; }
header { padding: 18px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
header h1 { font-size: 1.2rem; font-weight: 700; }
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 5px 8px; font-size: .75rem; cursor: pointer; }
.tab-nav { display: flex; border-bottom: 1px solid var(--border); background: var(--card); }
.tab-nav button { flex: 1; padding: 12px 4px; background: none; border: none; color: var(--muted); font-size: .85rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-nav button.active { color: var(--text); border-bottom-color: var(--azul); }
.cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 14px 12px; }
.card { background: var(--card); border-radius: 12px; padding: 12px 10px; border: 1px solid var(--border); text-align: center; }
.card .label { font-size: .65rem; text-transform: uppercase; color: var(--muted); }
.card .value { font-size: 1rem; font-weight: 700; }
.card.rec .value { color: var(--verde); } .card.desp .value { color: var(--vermelho); } .card.saldo .value { color: var(--azul); }
.real-card { background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--azul); margin: 0 12px 12px; padding: 12px; border-radius: 12px; text-align: center; }
.real-card .label { font-size: .7rem; color: var(--azul); font-weight: 700; }
.real-card .value { font-size: 1.2rem; font-weight: 800; }
.form-box { background: var(--card); margin: 0 12px 12px; border-radius: 14px; padding: 14px; border: 1px solid var(--border); }
.list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
.item { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.item-val.receita { color: var(--verde); } .item-val.despesa { color: var(--vermelho); } .item-val.pend { color: var(--amarelo); }
</style>
</head>
<body>
<header>
  <h1>💰 Finanças</h1>
  <div class="header-sync">
    <button class="sync-btn" onclick="exportCSV()">📊 CSV</button>
    <button class="sync-btn" onclick="abrirModal()">☁ Drive</button>
  </div>
</header>
<div class="tab-nav">
  <button class="active" onclick="setTab('lancamentos')">Lançamentos</button>
  <button onclick="setTab('pendencias')">Pendências</button>
  <button onclick="setTab('graficos')">Análise</button>
</div>
<div id="tab-lancamentos">
  <div class="cards">
    <div class="card rec"><div class="label">Receitas</div><div class="value" id="totalRec">R$ 0</div></div>
    <div class="card desp"><div class="label">Despesas</div><div class="value" id="totalDesp">R$ 0</div></div>
    <div class="card saldo"><div class="label">Saldo</div><div class="value" id="saldo">R$ 0</div></div>
  </div>
  <div class="real-card"><div class="label">Líquido Real</div><div class="value" id="saldoReal">R$ 0,00</div></div>
  <div class="form-box">
    <input id="searchInput" type="text" placeholder="🔍 Buscar..." onkeyup="render()" style="width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px; color:#fff; padding:10px; margin-bottom:10px">
    <input id="desc" type="text" placeholder="Descrição..." style="width:65%; background:var(--card2); border:1px solid var(--border); border-radius:8px; color:#fff; padding:10px">
    <input id="val" type="number" placeholder="0,00" style="width:30%; background:var(--card2); border:1px solid var(--border); border-radius:8px; color:#fff; padding:10px">
    <button onclick="addItem()" style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--verde); color:#fff; font-weight:700; margin-top:10px">Lançar</button>
  </div>
  <div class="list" id="list"></div>
</div>
<div id="tab-pendencias" style="display:none">
  <div class="form-box">
    <input id="pdesc" type="text" placeholder="O que pagar?" style="width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px; color:#fff; padding:10px; margin-bottom:8px">
    <input id="pval" type="number" placeholder="Valor" style="width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px; color:#fff; padding:10px">
    <button onclick="addPend()" style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--amarelo); color:#000; font-weight:700; margin-top:10px">Agendar</button>
  </div>
  <div class="list" id="listPend"></div>
</div>
<div id="tab-graficos" style="display:none"><div class="form-box" style="text-align:center"><canvas id="myChart"></canvas></div></div>
<script>
let db = JSON.parse(localStorage.getItem('zapia_financas_db')) || { items: [], pendencias: [] };
let chartInstance = null;
function save() { localStorage.setItem('zapia_financas_db', JSON.stringify(db)); render(); }
function setTab(tab) { ['lancamentos', 'pendencias', 'graficos'].forEach(t => document.getElementById('tab-'+t).style.display = (t===tab?'block':'none')); render(); }
function addItem() { const d = document.getElementById('desc').value, v = parseFloat(document.getElementById('val').value); if(d&&v) db.items.push({id:Date.now(), desc:d, val:v, tipo:'despesa', cat:'Outros', data:new Date().toISOString().split('T')[0]}); save(); }
function addPend() { const d = document.getElementById('pdesc').value, v = parseFloat(document.getElementById('pval').value); if(d&&v) db.pendencias.push({id:Date.now(), desc:d, val:v}); save(); }
function pagarPend(id) { const p = db.pendencias.find(x=>x.id===id); db.items.push({...p, tipo:'despesa', data:new Date().toISOString().split('T')[0]}); db.pendencias=db.pendencias.filter(x=>x.id!==id); save(); }
function render() {
    const s = document.getElementById('searchInput').value.toLowerCase();
    const filtered = db.items.filter(i => i.desc.toLowerCase().includes(s));
    let r=0, d=0; filtered.forEach(i => i.tipo==='receita'? r+=i.val : d+=i.val);
    const pTotal = db.pendencias.reduce((a,b)=>a+b.val, 0);
    document.getElementById('totalRec').innerText = 'R$ '+r.toFixed(2);
    document.getElementById('totalDesp').innerText = 'R$ '+d.toFixed(2);
    document.getElementById('saldo').innerText = 'R$ '+(r-d).toFixed(2);
    document.getElementById('saldoReal').innerText = 'R$ '+(r-d-pTotal).toFixed(2);
    const l = document.getElementById('list'); l.innerHTML = '';
    filtered.reverse().forEach(i => l.innerHTML += `<div class="item"><span>${i.desc}</span><b class="item-val ${i.tipo}">R$ ${i.val.toFixed(2)}</b></div>`);
    const lp = document.getElementById('listPend'); lp.innerHTML = '';
    db.pendencias.forEach(p => lp.innerHTML += `<div class="item" onclick="pagarPend(${p.id})"><span>${p.desc}</span><b class="item-val pend">R$ ${p.val.toFixed(2)}</b></div>`);
    if(document.getElementById('tab-graficos').style.display === 'block') updateChart(filtered);
}
function updateChart(data) {
    const ctx = document.getElementById('myChart'); if(!ctx) return;
    const cats = {}; data.forEach(i => cats[i.tipo] = (cats[i.tipo]||0)+i.val);
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, { type: 'pie', data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#ef4444','#22c55e'] }] }, options: { plugins: { legend: { labels: { color: '#fff' } } } } });
}
function exportCSV() { let csv = "Desc,Val,Tipo\n"; db.items.forEach(i => csv += i.desc + "," + i.val + "," + i.tipo + "\n"); window.open(URL.createObjectURL(new Blob([csv], {type:'text/csv'}))); }
window.onload = render;
</script>
</body>
</html>
