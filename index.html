<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Finanças Pessoais</title>
<meta name="description" content="Controle suas receitas, despesas e pendências.">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanças">
<style>
:root {
  --verde: #22c55e;
  --vermelho: #ef4444;
  --amarelo: #f59e0b;
  --azul: #3b82f6;
  --roxo: #a855f7;
  --bg: #0f172a;
  --card: #1e293b;
  --card2: #253047;
  --border: #334155;
  --text: #f1f5f9;
  --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 24px; }

/* HEADER */
header { padding: 18px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
header h1 { font-size: 1.2rem; font-weight: 700; }
header p { color: var(--muted); font-size: .75rem; margin-top: 1px; }
.header-sync { display: flex; gap: 6px; align-items: center; }
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 5px 8px; font-size: .75rem; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all .2s; }
.sync-btn:hover { border-color: var(--azul); color: var(--azul); }
.sync-btn.ok { border-color: var(--verde); color: var(--verde); }
.sync-btn.err { border-color: var(--vermelho); color: var(--vermelho); }

/* TABS NAV */
.tab-nav { display: flex; border-bottom: 1px solid var(--border); background: var(--card); }
.tab-nav button { flex: 1; padding: 12px 4px; background: none; border: none; color: var(--muted); font-size: .85rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
.tab-nav button.active { color: var(--text); border-bottom-color: var(--azul); }

/* CARDS */
.cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 14px 12px; }
.card { background: var(--card); border-radius: 12px; padding: 12px 10px; border: 1px solid var(--border); text-align: center; }
.card .label { font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
.card .value { font-size: 1rem; font-weight: 700; }
.card.rec .value { color: var(--verde); }
.card.desp .value { color: var(--vermelho); }
.card.saldo .value { color: var(--azul); }

/* PENDÊNCIAS CARDS */
.pend-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 12px; }
.pend-card { background: var(--card); border-radius: 12px; padding: 12px 10px; border: 1px solid var(--amarelo); text-align: center; }
.pend-card .label { font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
.pend-card .value { font-size: 1rem; font-weight: 700; color: var(--amarelo); }

/* MÊS NAV */
.mes-nav { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px 10px; }
.mes-nav button { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); width: 32px; height: 32px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.mes-nav button:hover { border-color: var(--azul); color: var(--azul); }
.mes-nav span { font-size: .9rem; font-weight: 600; }

/* FORM */
.form-box { background: var(--card); margin: 0 12px 12px; border-radius: 14px; padding: 14px; border: 1px solid var(--border); }
.tipo-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.tipo-tab { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .2s; }
.tipo-tab.rec.active { background: rgba(34,197,94,.15); border-color: var(--verde); color: var(--verde); }
.tipo-tab.desp.active { background: rgba(239,68,68,.15); border-color: var(--vermelho); color: var(--vermelho); }
.tipo-tab.pend.active { background: rgba(245,158,11,.15); border-color: var(--amarelo); color: var(--amarelo); }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row:last-child { margin-bottom: 0; }
.form-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.form-group input, .form-group select { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: .85rem; width: 100%; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--azul); }
.form-group select option { background: var(--card2); }
.pend-extra { display: none; }
.pend-extra.show { display: block; }
.btn-add { width: 100%; padding: 10px; border-radius: 10px; border: none; font-size: .9rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all .2s; }
.btn-add.rec { background: var(--verde); color: #fff; }
.btn-add.desp { background: var(--vermelho); color: #fff; }
.btn-add.pend { background: var(--amarelo); color: #000; }

/* FILTROS */
.filtros { display: flex; gap: 6px; padding: 0 12px 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
.filtros-left { display: flex; gap: 6px; }
.filt-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: .75rem; cursor: pointer; transition: all .2s; }
.filt-btn.active { background: var(--azul); border-color: var(--azul); color: #fff; }
.btn-limpar { padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: .72rem; cursor: pointer; }
.btn-limpar:hover { border-color: var(--vermelho); color: var(--vermelho); }

/* LISTA */
.list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
.item { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.item.pendente { border-color: var(--amarelo); }
.item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
.item-icon.rec { background: rgba(34,197,94,.15); }
.item-icon.desp { background: rgba(239,68,68,.15); }
.item-icon.pend { background: rgba(245,158,11,.15); }
.item-info { flex: 1; min-width: 0; }
.item-desc { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
.item-badge { font-size: .65rem; background: rgba(245,158,11,.2); color: var(--amarelo); border: 1px solid var(--amarelo); border-radius: 4px; padding: 1px 5px; margin-left: 4px; }
.item-val { font-size: .95rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.item-val.rec { color: var(--verde); }
.item-val.desp { color: var(--vermelho); }
.item-val.pend { color: var(--amarelo); }
.item-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.item-del { background: none; border: none; color: var(--muted); font-size: .8rem; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
.item-del:hover { color: var(--vermelho); }
.item-pay { background: rgba(34,197,94,.15); border: 1px solid var(--verde); color: var(--verde); font-size: .7rem; font-weight: 600; cursor: pointer; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.item-pay:hover { background: rgba(34,197,94,.3); }

.empty { text-align: center; color: var(--muted); padding: 32px 16px; font-size: .9rem; }

/* SEÇÃO PENDÊNCIAS */
.section-title { padding: 14px 12px 6px; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.section-title span.badge { background: var(--amarelo); color: #000; border-radius: 10px; padding: 1px 7px; font-size: .7rem; }

/* MODAL BACKUP */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 16px; padding: 20px; width: 100%; max-width: 340px; border: 1px solid var(--border); }
.modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
.modal p { color: var(--muted); font-size: .82rem; margin-bottom: 14px; line-height: 1.5; }
.modal-btns { display: flex; flex-direction: column; gap: 8px; }
.modal-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid var(--border); background: var(--card2); color: var(--text); font-size: .85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .2s; }
.modal-btn:hover { border-color: var(--azul); }
.modal-btn .icon { font-size: 1.1rem; }
.modal-close { margin-top: 10px; width: 100%; padding: 9px; border-radius: 10px; border: none; background: none; color: var(--muted); font-size: .82rem; cursor: pointer; }
.modal-close:hover { color: var(--text); }
#fileInput { display: none; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; font-size: .85rem; color: var(--text); opacity: 0; pointer-events: none; transition: all .3s; z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: var(--verde); color: var(--verde); }
.toast.err { border-color: var(--vermelho); color: var(--vermelho); }

/* BANNER INSTALAR */
#installBanner { display: none; align-items: center; gap: 10px; background: linear-gradient(135deg,#1e3a2f,#1e293b); border-bottom: 1px solid var(--verde); padding: 10px 14px; }
#installBanner span { flex: 1; font-size: .82rem; color: var(--text); }
#installBanner strong { color: var(--verde); }
.install-btn { background: var(--verde); color: #000; border: none; border-radius: 8px; padding: 7px 14px; font-size: .8rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
.install-close { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 2px 6px; }
</style>
</head>
<body>

<!-- BANNER INSTALAÇÃO (Android Chrome) -->
<div id="installBanner">
  <span>📲 <strong>Instalar o app</strong> na tela inicial</span>
  <button class="install-btn" onclick="installApp()">Instalar</button>
  <button class="install-close" onclick="this.parentElement.style.display='none'">✕</button>
</div>

<!-- HEADER -->
<header>
  <div>
    <h1>💰 Finanças</h1>
    <p id="hoje"></p>
  </div>
  <div class="header-sync">
    <button class="sync-btn" id="syncBtn" onclick="abrirModal()">☁ Drive</button>
  </div>
</header>

<!-- TABS -->
<div class="tab-nav">
  <button class="active" onclick="setTab('lancamentos')">Lançamentos</button>
  <button onclick="setTab('pendencias')">Pendências</button>
</div>

<!-- === TAB LANÇAMENTOS === -->
<div id="tab-lancamentos">

  <!-- Cards resumo -->
  <div class="cards">
    <div class="card rec"><div class="label">Receitas</div><div class="value" id="totalRec">R$ 0</div></div>
    <div class="card desp"><div class="label">Despesas</div><div class="value" id="totalDesp">R$ 0</div></div>
    <div class="card saldo"><div class="label">Saldo</div><div class="value" id="saldo">R$ 0</div></div>
  </div>

  <!-- Navegação de mês -->
  <div class="mes-nav">
    <button onclick="mudarMes(-1)">◀</button>
    <span id="mesTitulo">—</span>
    <button onclick="mudarMes(1)">▶</button>
  </div>

  <!-- Formulário -->
  <div class="form-box">
    <div class="tipo-tabs">
      <button class="tipo-tab rec" id="tabRec" onclick="setTipo('receita')">+ Receita</button>
      <button class="tipo-tab desp" id="tabDesp" onclick="setTipo('despesa')">− Despesa</button>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Descrição</label>
        <input id="desc" type="text" placeholder="Ex: Salário, Aluguel…"/>
      </div>
      <div class="form-group" style="flex:1">
        <label>Valor (R$)</label>
        <input id="val" type="number" min="0" step="0.01" placeholder="0,00"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoria</label>
        <select id="cat">
          <option value="Salário">Salário</option>
          <option value="Freelance">Freelance</option>
          <option value="Investimento">Investimento</option>
          <option value="Moradia">Moradia</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Saúde">Saúde</option>
          <option value="Lazer">Lazer</option>
          <option value="Educação">Educação</option>
          <option value="Assinatura">Assinatura</option>
          <option value="Outros">Outros</option>
        </select>
      </div>
      <div class="form-group">
        <label>Data</label>
        <input id="data" type="date"/>
      </div>
    </div>
    <button class="btn-add rec" id="btnAdd" onclick="addItem()">Adicionar</button>
  </div>

  <!-- Filtros -->
  <div class="filtros">
    <div class="filtros-left">
      <button class="filt-btn active" onclick="setFiltro('all')" id="fAll">Todos</button>
      <button class="filt-btn" onclick="setFiltro('receita')" id="fRec">Receitas</button>
      <button class="filt-btn" onclick="setFiltro('despesa')" id="fDesp">Despesas</button>
    </div>
    <button class="btn-limpar" onclick="limparMes()">🗑 Limpar mês</button>
  </div>

  <!-- Lista -->
  <div class="list" id="list"></div>

</div>

<!-- === TAB PENDÊNCIAS === -->
<div id="tab-pendencias" style="display:none">

  <!-- Cards resumo pendências -->
  <div class="pend-cards">
    <div class="pend-card"><div class="label">A pagar</div><div class="value" id="totalPend">R$ 0</div></div>
    <div class="pend-card" style="border-color:var(--roxo)"><div class="label">Qtd pendências</div><div class="value" style="color:var(--roxo)" id="qtdPend">0</div></div>
  </div>

  <!-- Formulário pendência -->
  <div class="form-box">
    <div class="tipo-tabs">
      <button class="tipo-tab pend active" style="flex:1">⏳ Nova Pendência</button>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>O que precisa pagar?</label>
        <input id="pdesc" type="text" placeholder="Ex: Conta de luz, Boleto…"/>
      </div>
      <div class="form-group" style="flex:1">
        <label>Valor (R$)</label>
        <input id="pval" type="number" min="0" step="0.01" placeholder="0,00"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoria</label>
        <select id="pcat">
          <option value="Moradia">Moradia</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Saúde">Saúde</option>
          <option value="Lazer">Lazer</option>
          <option value="Educação">Educação</option>
          <option value="Assinatura">Assinatura</option>
          <option value="Outros">Outros</option>
        </select>
      </div>
      <div class="form-group">
        <label>Vencimento</label>
        <input id="pvenc" type="date"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Observação (opcional)</label>
        <input id="pobs" type="text" placeholder="Ex: Parcela 2/3, lembrar de negociar…"/>
      </div>
    </div>
    <button class="btn-add pend" onclick="addPend()">⏳ Adicionar Pendência</button>
  </div>

  <!-- Lista pendências -->
  <div class="section-title">Pendentes <span class="badge" id="pendBadge">0</span></div>
  <div class="list" id="listPend"></div>

</div>

<!-- MODAL BACKUP -->
<div class="modal-overlay" id="modalBackup" onclick="fecharModalExterno(event)">
  <div class="modal">
    <h3>☁ Backup e Sincronização</h3>
    <p>Os dados são salvos localmente. Use o backup manual para salvar no Google Drive ou em outro dispositivo.</p>
    <div class="modal-btns">
      <button class="modal-btn" onclick="exportarDados()">
        <span class="icon">📥</span> Exportar dados (Copiar)
      </button>
      <button class="modal-btn" onclick="importarDados()">
        <span class="icon">📤</span> Importar dados (Colar)
      </button>
      <button class="modal-btn" onclick="baixarArquivo()">
        <span class="icon">💾</span> Salvar arquivo JSON
      </button>
      <label class="modal-btn">
        <span class="icon">📂</span> Abrir arquivo JSON
        <input type="file" id="fileInput" accept=".json" onchange="lerArquivo(event)"/>
      </label>
    </div>
    <button class="modal-close" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
/* 
  SISTEMA DE FINANÇAS PESSOAIS 
  - Salva tudo no LocalStorage
  - Gerencia Lançamentos e Pendências separadamente
  - Filtros por mês e tipo
*/

let db = {
  items: [],
  pendencias: []
};

let mesAtual = new Date().getMonth();
let anoAtual = new Date().getFullYear();
let tipoAtual = 'receita';
let filtroAtual = 'all';

// Ícones por categoria
const icones = {
  'Salário': '💵',
  'Freelance': '💻',
  'Investimento': '📈',
  'Moradia': '🏠',
  'Alimentação': '🍽️',
  'Transporte': '🚗',
  'Saúde': '🏥',
  'Lazer': '🎡',
  'Educação': '📚',
  'Assinatura': '📱',
  'Outros': '📦'
};

// Inicialização
window.onload = () => {
  const localData = localStorage.getItem('zapia_financas_db');
  if(localData) db = JSON.parse(localData);
  
  // Ajusta data do formulário para hoje
  document.getElementById('data').valueAsDate = new Date();
  document.getElementById('pvenc').valueAsDate = new Date();
  
  atualizarDataCabecalho();
  render();
  setTipo('receita');
  verificarPWA();
};

function atualizarDataCabecalho() {
  const opcoes = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('hoje').innerText = new Date().toLocaleDateString('pt-BR', opcoes);
}

// Alternar entre abas Lançamentos e Pendências
function setTab(tab) {
  const tabs = ['lancamentos', 'pendencias'];
  tabs.forEach(t => {
    document.getElementById('tab-' + t).style.display = (t === tab) ? 'block' : 'none';
  });
  
  // Ajusta botões
  const btns = document.querySelectorAll('.tab-nav button');
  btns[0].classList.toggle('active', tab === 'lancamentos');
  btns[1].classList.toggle('active', tab === 'pendencias');
  
  render();
}

// Alternar entre Receita e Despesa no form
function setTipo(t) {
  tipoAtual = t;
  const btnRec = document.getElementById('tabRec');
  const btnDesp = document.getElementById('tabDesp');
  const btnAdd = document.getElementById('btnAdd');
  
  btnRec.classList.toggle('active', t === 'receita');
  btnDesp.classList.toggle('active', t === 'despesa');
  
  btnAdd.innerText = t === 'receita' ? 'Adicionar Receita' : 'Adicionar Despesa';
  btnAdd.className = 'btn-add ' + (t === 'receita' ? 'rec' : 'desp');
}

// Navegação de Meses
function mudarMes(delta) {
  mesAtual += delta;
  if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
  if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
  render();
}

function setFiltro(f) {
  filtroAtual = f;
  document.getElementById('fAll').classList.toggle('active', f === 'all');
  document.getElementById('fRec').classList.toggle('active', f === 'receita');
  document.getElementById('fDesp').classList.toggle('active', f === 'despesa');
  render();
}

// --- LANÇAMENTOS ---

function addItem() {
  const desc = document.getElementById('desc').value;
  const val = parseFloat(document.getElementById('val').value);
  const cat = document.getElementById('cat').value;
  const data = document.getElementById('data').value;
  
  if(!desc || !val || !data) return showToast('Preencha todos os campos!', 'err');
  
  const novoItem = {
    id: Date.now(),
    desc,
    val,
    cat,
    data,
    tipo: tipoAtual
  };
  
  db.items.push(novoItem);
  save();
  
  // Limpa campos
  document.getElementById('desc').value = '';
  document.getElementById('val').value = '';
  showToast('Lançamento adicionado!');
}

function deleteItem(id) {
  if(!confirm('Excluir este lançamento?')) return;
  db.items = db.items.filter(i => i.id !== id);
  save();
  showToast('Lançamento excluído');
}

function limparMes() {
  const mesNome = new Intl.DateTimeFormat('pt-BR', { month: 'long' }).format(new Date(anoAtual, mesAtual));
  if(!confirm(`Deseja apagar TODOS os lançamentos de ${mesNome}?`)) return;
  
  db.items = db.items.filter(i => {
    const d = new Date(i.data + 'T12:00:00');
    return !(d.getMonth() === mesAtual && d.getFullYear() === anoAtual);
  });
  save();
}

// --- PENDÊNCIAS ---

function addPend() {
  const desc = document.getElementById('pdesc').value;
  const val = parseFloat(document.getElementById('pval').value);
  const cat = document.getElementById('pcat').value;
  const venc = document.getElementById('pvenc').value;
  const obs = document.getElementById('pobs').value;
  
  if(!desc || !val || !venc) return showToast('Preencha os campos obrigatórios!', 'err');
  
  const novaPend = {
    id: Date.now(),
    desc,
    val,
    cat,
    venc,
    obs
  };
  
  db.pendencias.push(novaPend);
  save();
  
  document.getElementById('pdesc').value = '';
  document.getElementById('pval').value = '';
  document.getElementById('pobs').value = '';
  showToast('Pendência agendada!');
}

function deletePend(id) {
  if(!confirm('Remover esta pendência?')) return;
  db.pendencias = db.pendencias.filter(p => p.id !== id);
  save();
}

function pagarPend(id) {
  const pend = db.pendencias.find(p => p.id === id);
  if(!pend) return;
  
  // Adiciona aos lançamentos como despesa
  const novoLancamento = {
    id: Date.now(),
    desc: pend.desc,
    val: pend.val,
    cat: pend.cat,
    data: new Date().toISOString().split('T')[0],
    tipo: 'despesa'
  };
  
  db.items.push(novoLancamento);
  // Remove das pendências
  db.pendencias = db.pendencias.filter(p => p.id !== id);
  
  save();
  showToast('Pago e lançado nas despesas!');
}

// --- CORE ---

function save() {
  localStorage.setItem('zapia_financas_db', JSON.stringify(db));
  render();
}

function render() {
  const listEl = document.getElementById('list');
  const listPendEl = document.getElementById('listPend');
  const mesTitulo = document.getElementById('mesTitulo');
  
  // Filtra itens por mês/ano
  const itensMes = db.items.filter(i => {
    const d = new Date(i.data + 'T12:00:00');
    return d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
  });
  
  // Título do mês
  const nomeMes = new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(new Date(anoAtual, mesAtual));
  mesTitulo.innerText = nomeMes.charAt(0).toUpperCase() + nomeMes.slice(1);
  
  // Cálculos de resumo
  let recTotal = 0;
  let despTotal = 0;
  
  itensMes.forEach(i => {
    if(i.tipo === 'receita') recTotal += i.val;
    else despTotal += i.val;
  });
  
  document.getElementById('totalRec').innerText = 'R$ ' + recTotal.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('totalDesp').innerText = 'R$ ' + despTotal.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('saldo').innerText = 'R$ ' + (recTotal - despTotal).toLocaleString('pt-BR', {minimumFractionDigits:2});
  
  // Renderiza Lançamentos com Filtro
  listEl.innerHTML = '';
  const itensFiltrados = filtroAtual === 'all' ? itensMes : itensMes.filter(i => i.tipo === filtroAtual);
  
  // Ordenar por data decrescente
  itensFiltrados.sort((a,b) => new Date(b.data) - new Date(a.data));
  
  if(itensFiltrados.length === 0) {
    listEl.innerHTML = '<div class="empty">Nenhum lançamento este mês.</div>';
  } else {
    itensFiltrados.forEach(i => {
      const dataFmt = new Date(i.data + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
      listEl.innerHTML += `
        <div class="item">
          <div class="item-icon ${i.tipo === 'receita' ? 'rec' : 'desp'}">${icones[i.cat] || '💰'}</div>
          <div class="item-info">
            <div class="item-desc">${i.desc}</div>
            <div class="item-meta">${dataFmt} • ${i.cat}</div>
          </div>
          <div class="item-val ${i.tipo === 'receita' ? 'rec' : 'desp'}">
            ${i.tipo === 'receita' ? '+' : '−'} ${i.val.toLocaleString('pt-BR', {minimumFractionDigits:2})}
          </div>
          <div class="item-actions">
            <button class="item-del" onclick="deleteItem(${i.id})">🗑</button>
          </div>
        </div>
      `;
    });
  }
  
  // Renderiza Pendências
  listPendEl.innerHTML = '';
  let pendTotal = 0;
  
  // Ordenar pendências por vencimento
  db.pendencias.sort((a,b) => new Date(a.venc) - new Date(b.venc));
  
  db.pendencias.forEach(p => {
    pendTotal += p.val;
    const vencFmt = new Date(p.venc + 'T12:00:00').toLocaleDateString('pt-BR');
    listPendEl.innerHTML += `
      <div class="item pendente">
        <div class="item-icon pend">${icones[p.cat] || '⏳'}</div>
        <div class="item-info">
          <div class="item-desc">${p.desc}</div>
          <div class="item-meta">Vence ${vencFmt} • ${p.cat}</div>
          ${p.obs ? `<div class="item-meta" style="font-style:italic">"${p.obs}"</div>` : ''}
        </div>
        <div class="item-val pend">
          R$ ${p.val.toLocaleString('pt-BR', {minimumFractionDigits:2})}
        </div>
        <div class="item-actions">
          <button class="item-pay" onclick="pagarPend(${p.id})">PAGO</button>
          <button class="item-del" onclick="deletePend(${p.id})">🗑</button>
        </div>
      </div>
    `;
  });
  
  if(db.pendencias.length === 0) listPendEl.innerHTML = '<div class="empty">Tudo em dia! Nenhuma pendência.</div>';
  
  document.getElementById('totalPend').innerText = 'R$ ' + pendTotal.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('qtdPend').innerText = db.pendencias.length;
  document.getElementById('pendBadge').innerText = db.pendencias.length;
}

// --- BACKUP ---

function abrirModal() { document.getElementById('modalBackup').classList.add('show'); }
function fecharModal() { document.getElementById('modalBackup').classList.remove('show'); }
function fecharModalExterno(e) { if(e.target.id === 'modalBackup') fecharModal(); }

function exportarDados() {
  const data = JSON.stringify(db);
  navigator.clipboard.writeText(data).then(() => {
    showToast('Dados copiados! Cole no seu backup.');
    fecharModal();
  });
}

function importarDados() {
  const raw = prompt("Cole aqui o código do seu backup:");
  if(!raw) return;
  try {
    const importDb = JSON.parse(raw);
    if(importDb.items || importDb.pendencias) {
      db = importDb;
      save();
      showToast('Dados restaurados!');
      fecharModal();
    } else { throw new Error(); }
  } catch(e) {
    showToast('Código de backup inválido.', 'err');
  }
}

function baixarArquivo() {
  const data = JSON.stringify(db, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup_financas_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

function lerArquivo(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const importDb = JSON.parse(ev.target.result);
      if(importDb.items || importDb.pendencias) {
        db = importDb;
        save();
        showToast('Backup carregado com sucesso!');
        fecharModal();
      }
    } catch(err) { showToast('Arquivo inválido.', 'err'); }
  };
  reader.readAsText(file);
}

// --- UTILS ---

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Lógica de PWA Simplificada
function verificarPWA() {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!isStandalone && /Android/i.test(navigator.userAgent)) {
    document.getElementById('installBanner').style.display = 'flex';
  }
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

async function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById('installBanner').style.display = 'none';
    }
    deferredPrompt = null;
  }
}
</script>
