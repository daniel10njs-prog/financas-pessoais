<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Finanças Premium v25</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #000000; 
            --card-bg: #121214;
            --card-header: #1a1a1e;
            --text-primary: #ffffff;
            --text-muted: #8e8e93;
            --accent-blue: #2563eb;
            --accent-red: #ff3b30;
            --up: #4ade80;
            --border: rgba(255, 255, 255, 0.08);
            --nav-bg: #0d0d0f;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding-bottom: 120px;
            min-height: 100vh;
        }

        /* HEADER & DATE SELECTOR (Based on Image) */
        header { 
            padding: 24px 20px; 
            display: flex; justify-content: space-between; align-items: flex-start; 
        }
        .header-left h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .header-left p { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        
        .header-right { display: flex; gap: 8px; }
        .btn-header { 
            background: var(--card-header); border: 1px solid var(--border); 
            color: #fff; width: 44px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer;
        }

        /* CARDS DE PENDÊNCIAS (DESIGN IDÊNTICO À IMAGEM) */
        .content-section { padding: 0 16px; margin-top: 10px; }
        
        .pending-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        /* Faixa Vermelha à Esquerda (Marcante na imagem) */
        .pending-card::before {
            content: ''; position: absolute; left: 0; top: 15%; height: 70%; width: 4px; 
            background: var(--accent-red); border-radius: 0 4px 4px 0;
        }

        .p-left { display: flex; align-items: center; gap: 18px; }
        .p-check {
            width: 26px; height: 26px; border-radius: 8px;
            background: var(--accent-blue); display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px;
        }
        
        .p-info .p-title { font-size: 1.05rem; font-weight: 600; color: #fff; margin-bottom: 5px; display: block; }
        .p-info .p-sub { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }
        .p-val { font-family: 'JetBrains Mono', monospace; font-size: 1.05rem; font-weight: 700; color: var(--accent-red); opacity: 0.9; }

        /* NAV INFERIOR (TODAS AS GUIAS CONFORME IMAGEM) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
            background: var(--nav-bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px 15px; z-index: 2000;
        }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); }
        .nav-tab.active { color: var(--accent-blue); }
        .nav-tab i { font-size: 1.3rem; }
        .nav-tab span { font-size: 0.55rem; text-transform: uppercase; font-weight: 800; letter-spacing: 0.02em; }
        
        /* GUIAS ESPECIAS COM NOTIFICAÇÃO */
        .badge-tab { position: relative; }
        .badge-val { 
            position: absolute; top: -5px; right: -8px; background: var(--accent-red); 
            color: #fff; font-size: 0.6rem; font-weight: 900; width: 14px; height: 14px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* FLOATING ADD */
        .fab { 
            position: fixed; bottom: 110px; right: 20px; width: 60px; height: 60px; 
            background: var(--accent-blue); border-radius: 20px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 28px; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); z-index: 1000;
        }

        .tab-view { display: none; }
        .tab-view.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class='header-left'>
        <h1>Finanças</h1>
        <p>Julho de 2026</p>
    </div>
    <div class='header-right'>
        <div class='btn-header'><i class='lucide-chevron-left'></i></div>
        <div class='btn-header'><i class='lucide-chevron-right'></i></div>
        <div class='btn-header' onclick='openMenu()'><i class='lucide-more-vertical'></i></div>
    </div>
</header>

<div id='view-lancar' class='tab-view active'>
    <div class='content-section' id='mainList'>
        <!-- Cards de Pendências Idênticos à Imagem -->
    </div>
</div>

<!-- SKELETON PARA AS OUTRAS GUIAS SOLICITADAS -->
<div id='view-contas' class='tab-view'><div class='content-section'><h2>Contas</h2></div></div>
<div id='view-graficos' class='tab-view'><div class='content-section'><h2>Gráficos</h2></div></div>
<div id='view-ia' class='tab-view'><div class='content-section'><h2>Zapia IA</h2></div></div>
<div id='view-pagar' class='tab-view'><div class='content-section'><h2>Contas a Pagar</h2></div></div>
<div id='view-metas' class='tab-view'><div class='content-section'><h2>Metas</h2></div></div>
<div id='view-simular' class='tab-view'><div class='content-section'><h2>Simulações</h2></div></div>

<div class='fab' onclick='addItem()'>+</div>

<nav class='bottom-nav'>
    <div class='nav-tab active' onclick='setTab("lancar")'><i class='lucide-banknote'></i><span>Lançar</span></div>
    <div class='nav-tab badge-tab' onclick='setTab("contas")'><div class='badge-val'>1</div><i class='lucide-hourglass'></i><span>Contas</span></div>
    <div class='nav-tab' onclick='setTab("graficos")'><i class='lucide-bar-chart-2'></i><span>Gráficos</span></div>
    <div class='nav-tab' onclick='setTab("ia")'><i class='lucide-sparkles'></i><span>IA</span></div>
    <div class='nav-tab' onclick='setTab("pagar")'><i class='lucide-calendar-days'></i><span>Pagar</span></div>
    <div class='nav-tab' onclick='setTab("metas")'><i class='lucide-target'></i><span>Metas</span></div>
    <div class='nav-tab' onclick='setTab("simular")'><i class='lucide-balance-scale'></i><span>Simular</span></div>
</nav>

<script>
    let db = {
        items: [
            { id: 1, desc: 'Moto - 1/48', val: 888.17, cat: 'bike Moto', date: '2026-07-20' },
            { id: 2, desc: 'Aluguel', val: 250.00, cat: 'home Moradia', date: '2026-07-20' },
            { id: 3, desc: 'Salgados - Bebeba', val: 54.00, cat: 'utensils-crossed Alimentação', date: '2026-07-20' },
            { id: 4, desc: 'Lanches - Guiguia', val: 40.00, cat: 'utensils-crossed Alimentação', date: '2026-07-20' },
            { id: 5, desc: 'Conta Energia', val: 36.00, cat: 'home Moradia', date: '2026-07-20' },
            { id: 6, desc: 'Internet', val: 60.00, cat: 'home Moradia', date: '2026-07-20' },
            { id: 7, desc: 'Plano Celular', val: 43.02, cat: 'smartphone Assinatura', date: '2026-07-20' },
            { id: 8, desc: 'Botijão', val: 120.00, cat: 'home Moradia', date: '2026-07-20' },
            { id: 9, desc: 'Empréstimo - Otávio', val: 126.00, cat: 'shield-check Outros', date: '2026-07-20' }
        ]
    };

    function setTab(t) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + t).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function render() {
        const list = document.getElementById('mainList');
        list.innerHTML = '';
        db.items.forEach(i => {
            list.innerHTML += `
                <div class='pending-card'>
                    <div class='p-left'>
                        <div class='p-check'><i class='lucide-check'></i></div>
                        <div class='p-info'>
                            <span class='p-title'>${i.desc}</span>
                            <span class='p-sub'>Venc: ${new Date(i.date).toLocaleDateString('pt-BR')} | ${i.cat}</span>
                        </div>
                    </div>
                    <div class='p-val'>R$ ${i.val.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                </div>
            `;
        });
    }

    render();
</script>
</body>
</html>
