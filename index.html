<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Finanças Pessoais</title>
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Link para FontAwesome para ícones de lápis e lixeira -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --verde: #22c55e; --vermelho: #ef4444; --amarelo: #f59e0b; --azul: #3b82f6;
  --bg: #0f172a; --card: #1e293b; --card2: #253047; --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; max-width: 480px; margin: 0 auto; padding-bottom: 80px; min-height: 100vh; }

/* Header */
header { padding: 18px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1.2rem; font-weight: 700; }
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 5px 8px; font-size: .75rem; cursor: pointer; }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.bottom-nav button { flex: 1; padding: 14px 0; background: none; border: none; color: var(--muted); font-size: .65rem; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bottom-nav button.active { color: var(--azul); }

/* Sections */
.content-section { display: none; padding: 14px 12px; }
.content-section.active { display: block; }

/* Cards */
.cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.card { background: var(--card); border-radius: 12px; padding: 12px 10px; border: 1px solid var(--border); text-align: center; }
.card .label { font-size: .65rem; text-transform: uppercase; color: var(--muted); }
.card .value { font-size: 1rem; font-weight: 700; }
.card.rec .value { color: var(--verde); } .card.desp .value { color: var(--vermelho); } .card.saldo .value { color: var(--azul); }
.real-card { background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--azul); margin-bottom: 16px; padding: 12px; border-radius: 12px; text-align: center; }
.real-card .label { font-size: .7rem; color: var(--azul); font-weight: 700; }
.real-card .value { font-size: 1.2rem; font-weight: 800; }

.action-buttons { display: flex; gap: 12px; margin-bottom: 16px; }
.btn-action { flex: 1; padding: 16px; border-radius: 14px; border: none; color: #fff; font-size: 1.1rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-action.plus { background: var(--verde); }
.btn-action.minus { background: var(--vermelho); }
.btn-action.pend { background: var(--amarelo); }

/* List Item Moderno */
.list { display: flex; flex-direction: column; gap: 10px; }
.item { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: relative; }
.item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
.item-icon { font-size: 1.2rem; background: var(--card2); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
.item-text b { font-size: .9rem; display: block; }
.item-text span { font-size: .7rem; color: var(--muted); }

.item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.item-val { font-weight: 700; font-size: 0.95rem; }
.item-val.receita { color: var(--verde); } .item-val.despesa { color: var(--vermelho); } .item-val.pendencia { color: var(--amarelo); }

.item-actions { display: flex; gap: 10px; align-items: center; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 5px; font-size: 0.9rem; transition: opacity 0.2s; }
.icon-btn.edit { color: var(--azul); }
.icon-btn.delete { color: var(--vermelho); }
.icon-btn:active { opacity: 0.5; }

.btn-pay-direct { background: var(--verde); color: white; border: none; border-radius: 6px; padding: 4px 10px; font-size: 0.65rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }

/* Modais */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; border: 1px solid var(--border); }
.modal h2 { margin-bottom: 20px; font-size: 1.1rem; text-align: center; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .7rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
.form-group input, .form-group select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; font-size: 1rem; outline: none; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-save { flex: 1; padding: 14px; border-radius: 10px; border: none; background: var(--azul); color: #fff; font-weight: 700; cursor: pointer; }
.btn-cancel { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: none; color: var(--muted); font-weight: 600; cursor: pointer; }

/* Widgets */
.widget { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.widget-title { font-size: .75rem; font-weight: 700; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; }
.progress-bar { height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; margin-top: 10px; }
.progress-fill { height: 100%; background: var(--azul); width: 0%; transition: width 0.5s; }
</style>
</head>
<body>

<header>
  <h1>💰 Finanças</h1>
  <button class="sync-btn" onclick="exportCSV()">📊 EXPORTAR</button>
</header>

<section id="sec-lancamentos" class="content-section active">
  <div class="cards">
    <div class="card rec"><div class="label">Receitas</div><div class="value" id="totalRec">R$ 0</div></div>
    <div class="card desp"><div class="label">Despesas</div><div class="value" id="totalDesp">R$ 0</div></div>
    <div class="card saldo"><div class="label">Saldo</div><div class="value" id="saldo">R$ 0</div></div>
  </div>
  <div class="real-card"><div class="label">Líquido Real</div><div class="value" id="saldoReal">R$ 0,00</div></div>
  <div class="action-buttons">
    <button class="btn-action plus" onclick="openModal('receita')">＋ Receita</button>
    <button class="btn-action minus" onclick="openModal('despesa')">－ Despesa</button>
  </div>
  <div class="list" id="list"></div>
</section>

<section id="sec-pendencias" class="content-section">
  <div class="widget" style="background: rgba(245, 158, 11, 0.05); border-color: var(--amarelo);">
    <div class="widget-title" style="color: var(--amarelo);">Total Pendente</div>
    <div id="totalPendValue" style="font-size:1.5rem; font-weight:800; color: var(--amarelo);">R$ 0,00</div>
  </div>
  <button class="btn-action pend" style="width:100%; margin-bottom:16px;" onclick="openModal('pendencia')">＋ Nova Pendência</button>
  <div class="list" id="listPend"></div>
</section>

<section id="sec-reserva" class="content-section">
  <div class="widget">
    <div class="widget-title">🎯 Reserva de Emergência</div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div id="reservaValue" style="font-size:1.5rem; font-weight:800;">R$ 0,00</div>
      <button class="sync-btn" onclick="openReservaModal()">ADICIONAR</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="reservaProgress"></div></div>
  </div>
</section>

<section id="sec-analise" class="content-section">
  <div class="widget" style="text-align:center;"><canvas id="myChart" style="max-height:300px;"></canvas></div>
</section>

<nav class="bottom-nav">
  <button id="nav-lancamentos" class="active" onclick="setTab('lancamentos')"><i class="fas fa-list-ul"></i>Lançamentos</button>
  <button id="nav-pendencias" onclick="setTab('pendencias')"><i class="fas fa-clock"></i>Pendências</button>
  <button id="nav-reserva" onclick="setTab('reserva')"><i class="fas fa-bullseye"></i>Reserva</button>
  <button id="nav-analise" onclick="setTab('analise')"><i class="fas fa-chart-pie"></i>Análise</button>
</nav>

<div class="modal-overlay" id="modalEntry">
  <div class="modal">
    <h2 id="modalTitle">Lançamento</h2>
    <input type="hidden" id="editId"><input type="hidden" id="editType">
    <div class="form-group"><label>Descrição</label><input id="desc" type="text"></div>
    <div class="form-group"><label>Valor (R$)</label><input id="val" type="number" step="0.01"></div>
    <div class="form-group"><label>Tipo / Categoria</label><select id="tipoSub"></select></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEntry()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalReserva"><div class="modal"><h2>Reserva</h2><input id="reservaAdd" type="number" step="0.01" style="width:100%; margin-bottom:10px; background:var(--card2); border:1px solid var(--border); padding:12px; color:#fff; border-radius:10px;"><button class="btn-save" onclick="saveReserva()" style="width:100%">Confirmar</button><button class="btn-cancel" onclick="closeReservaModal()" style="width:100%; margin-top:10px;">Voltar</button></div></div>

<script>
let db = JSON.parse(localStorage.getItem('zapia_financas_db')) || { items: [], pendencias: [], reserva: 0 };
let chartInstance = null;
const icons = { 'Salário': '💰', 'Pix Recebido': '💸', 'Ajuste': '⚙️', 'Alimentação': '🍽️', 'Transporte': '🚗', 'Moradia': '🏠', 'Lazer': '🎡', 'Saúde': '🏥', 'Educação': '📚', 'Assinaturas': '📺', 'Outros': '📦' };
const categorias = { 'receita': ['Salário', 'Pix Recebido', 'Ajuste'], 'despesa': ['Alimentação', 'Transporte', 'Moradia', 'Lazer', 'Saúde', 'Ajuste', 'Outros'], 'pendencia': ['Moradia', 'Educação', 'Assinaturas', 'Saúde', 'Outros'] };

function save() { localStorage.setItem('zapia_financas_db', JSON.stringify(db)); render(); }
function setTab(tab) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='analise') initChart();
  render();
}
function openModal(mode, id = null) {
  const select = document.getElementById('tipoSub'); select.innerHTML = '';
  categorias[mode === 'pendencia' ? 'pendencia' : (mode === 'receita' ? 'receita' : 'despesa')].forEach(cat => select.innerHTML += `<option value="${cat}">${cat}</option>`);
  document.getElementById('editType').value = mode;
  if(id) {
    const list = mode === 'pendencia' ? db.pendencias : db.items;
    const item = list.find(x => x.id === id);
    document.getElementById('modalTitle').innerText = 'Editar';
    document.getElementById('editId').value = id; document.getElementById('desc').value = item.desc; document.getElementById('val').value = item.val; document.getElementById('tipoSub').value = item.sub;
  } else {
    document.getElementById('modalTitle').innerText = mode === 'receita' ? 'Nova Receita' : (mode === 'despesa' ? 'Nova Despesa' : 'Nova Pendência');
    document.getElementById('editId').value = ''; document.getElementById('desc').value = ''; document.getElementById('val').value = '';
  }
  document.getElementById('modalEntry').classList.add('show');
}
function closeModal() { document.getElementById('modalEntry').classList.remove('show'); }
function saveEntry() {
  const d = document.getElementById('desc').value, v = parseFloat(document.getElementById('val').value), s = document.getElementById('tipoSub').value, id = document.getElementById('editId').value, type = document.getElementById('editType').value;
  if(!d || !v) return;
  if(type === 'pendencia') {
    if(id) { const idx = db.pendencias.findIndex(x => x.id == id); db.pendencias[idx] = { ...db.pendencias[idx], desc: d, val: v, sub: s }; }
    else db.pendencias.push({ id: Date.now(), desc: d, val: v, sub: s });
  } else {
    if(id) { const idx = db.items.findIndex(x => x.id == id); db.items[idx] = { ...db.items[idx], desc: d, val: v, sub: s }; }
    else db.items.push({ id: Date.now(), desc: d, val: v, tipo: type, sub: s, data: new Date().toISOString() });
  }
  save(); closeModal();
}
function deleteItem(id, type, event) {
  event.stopPropagation();
  if(type === 'pendencia') db.pendencias = db.pendencias.filter(x => x.id != id);
  else db.items = db.items.filter(x => x.id != id);
  save();
}
function directPay(id, event) {
  event.stopPropagation();
  const p = db.pendencias.find(x => x.id == id);
  db.items.push({ id: Date.now(), desc: p.desc, val: p.val, tipo: 'despesa', sub: p.sub, data: new Date().toISOString() });
  db.pendencias = db.pendencias.filter(x => x.id != id);
  save();
}
function openReservaModal() { document.getElementById('modalReserva').classList.add('show'); }
function closeReservaModal() { document.getElementById('modalReserva').classList.remove('show'); }
function saveReserva() { const v = parseFloat(document.getElementById('reservaAdd').value); if(v) { db.reserva = (db.reserva||0) + v; save(); closeReservaModal(); } }
function initChart() {
  const ctx = document.getElementById('myChart').getContext('2d'); if(chartInstance) chartInstance.destroy();
  const totals = {}; db.items.filter(i=>i.tipo==='despesa').forEach(i => totals[i.sub] = (totals[i.sub]||0) + i.val);
  chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b', '#22c55e', '#8b5cf6', '#ec4899'] }] }, options: { plugins: { legend: { position: 'bottom', labels: { color: '#f1f5f9' } } } } });
}
function render() {
  let r=0, d=0, p=0; db.items.forEach(i => i.tipo==='receita'? r+=i.val : d+=i.val); db.pendencias.forEach(i => p+=i.val);
  document.getElementById('totalRec').innerText = 'R$ '+r.toLocaleString('pt-BR');
  document.getElementById('totalDesp').innerText = 'R$ '+d.toLocaleString('pt-BR');
  document.getElementById('saldo').innerText = 'R$ '+(r-d).toLocaleString('pt-BR');
  document.getElementById('saldoReal').innerText = 'R$ '+(r-d-p).toLocaleString('pt-BR');
  document.getElementById('totalPendValue').innerText = 'R$ '+p.toLocaleString('pt-BR');
  document.getElementById('reservaValue').innerText = 'R$ '+(db.reserva||0).toLocaleString('pt-BR');
  document.getElementById('reservaProgress').style.width = Math.min((db.reserva/5000)*100, 100) + '%';
  
  const l = document.getElementById('list'); l.innerHTML = '';
  db.items.slice().reverse().forEach(i => { 
    l.innerHTML += `
    <div class="item">
      <div class="item-info">
        <div class="item-icon">${icons[i.sub]||'📦'}</div>
        <div class="item-text"><b>${i.desc}</b><span>${i.sub}</span></div>
      </div>
      <div class="item-right">
        <b class="item-val ${i.tipo}">${i.tipo==='receita'?'+':'-'} R$ ${i.val.toFixed(2)}</b>
        <div class="item-actions">
          <button class="icon-btn edit" onclick="openModal('${i.tipo}', ${i.id})"><i class="fas fa-pencil-alt"></i></button>
          <button class="icon-btn delete" onclick="deleteItem(${i.id}, '${i.tipo}', event)"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    </div>`; 
  });

  const lp = document.getElementById('listPend'); lp.innerHTML = '';
  db.pendencias.forEach(i => {
    lp.innerHTML += `
    <div class="item">
      <div class="item-info">
        <div class="item-icon">${icons[i.sub]||'⏳'}</div>
        <div class="item-text"><b>${i.desc}</b><span>${i.sub}</span></div>
      </div>
      <div class="item-right">
        <b class="item-val pendencia">R$ ${i.val.toFixed(2)}</b>
        <div class="item-actions">
          <button class="btn-pay-direct" onclick="directPay(${i.id}, event)">Pagar</button>
          <button class="icon-btn edit" onclick="openModal('pendencia', ${i.id})"><i class="fas fa-pencil-alt"></i></button>
          <button class="icon-btn delete" onclick="deleteItem(${i.id}, 'pendencia', event)"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    </div>`;
  });
}
window.onload = render;
</script>
</body>
</html>
