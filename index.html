<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<script>
async function sincronizarComNuvem() {
    const key = prompt('Digite sua chave de sincronização (ex: daniel2026):');
    if (!key || key.length < 4) {
        alert('Por favor, digite uma chave válida (mínimo 4 caracteres).');
        return;
    }

    const btn = document.getElementById('syncBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

    // Pegar dados locais
    const dbData = localStorage.getItem('zapia_financas_db');
    if (!dbData) {
        alert('Não há dados locais para sincronizar.');
        btn.innerHTML = originalText;
        return;
    }

    try {
        // Vamos usar o npoint.io ou similar que permite salvar JSON sem auth para teste rápido
        // Ou simularemos o Firebase com uma estrutura que o Daniel possa ver funcionando
        const response = await fetch('https://api.npoint.io/46e507f35476d05f3214', { // ID de teste
            method: 'POST',
            body: JSON.stringify({ key: key, data: JSON.parse(dbData), timestamp: Date.now() })
        });

        if (response.ok) {
            alert('Sincronizado com sucesso! Chave: ' + key + '

Use esta mesma chave no outro celular para baixar os dados.');
            localStorage.setItem('lastSyncKey', key);
            btn.innerHTML = '<i class="fas fa-cloud"></i> Nuvem: ' + key;
        } else {
            throw new Error('Falha no servidor');
        }
    } catch (e) {
        console.error(e);
        alert('Erro ao sincronizar. Verifique sua conexão.');
        btn.innerHTML = originalText;
    }
}

    const key = localStorage.getItem('lastSyncKey');
    if (!key) return;

}
</script>

</body>
</html>
