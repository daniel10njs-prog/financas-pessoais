<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance Ultra v12</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #050810; --card: #0f1424; --primary: #3b82f6; --text: #f8fafc;
            --muted: #64748b; --up: #10b981; --down: #f43f5e; --warn: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 150px; max-width: 500px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 40px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        header h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-icon { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 12px; cursor: pointer; }

        .tab-content { display: none; padding: 0 20px; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard */
        .dash-main { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 32px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .dash-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .dash-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .dash-val { font-size: 1.1rem; font-weight: 800; }
        
        /* Forms & Inputs */
        .card-inner { background: var(--card); padding: 20px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 15px; }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; }
        input, select { width: 100%; padding: 14px 14px 14px 45px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; color: white; font-size: 0.9rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 16px; color: white; font-weight: 800; font-size: 0.9rem; cursor: pointer; }

        /* List Items */
        .item-card { background: var(--card); padding: 16px; border-radius: 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.02); position: relative; }
        .item-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.03); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .item-info { flex: 1; }
        .item-title { font-size: 0.9rem; font-weight: 700; }
        .item-val { font-weight: 800; font-size: 0.95rem; text-align: right; }
        .btn-del { color: var(--down); background: none; border: none; padding: 5px; cursor: pointer; opacity: 0.5; }

        /* Nav Bar - Ultra Responsive */
        .bottom-nav { position: fixed; bottom: 15px; left: 3%; width: 94%; background: rgba(15, 20, 36, 0.95); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); display: flex; padding: 8px 4px; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); text-decoration: none; flex: 1; padding: 10px 0; border-radius: 16px; transition: 0.2s; }
        .nav-item.active { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .nav-item i { font-size: 1.1rem; }
        .nav-item span { font-size: 0.45rem; font-weight: 800; text-transform: uppercase; }

        /* Search */
        .search-box { margin-bottom: 15px; }
        .search-box input { padding-left: 45px; height: 45px; }

        /* Category Chips */
        .cat-chip { font-size: 0.6rem; padding: 2px 8px; border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--muted); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 id='viewTitle'>Lançar</h1>
        <p style='color:var(--muted); font-size:0.7rem; font-weight:700' id='currentMonth'>JULHO 2026</p>
    </div>
    <button class='btn-icon' onclick='exportData()'><i class='lucide-download'></i></button>
</header>

<!-- 1. LANÇAR -->
<div id='view-lancar' class='tab-content active'>
    <div class='dash-main'>
        <div class='dash-row'>
            <div><span class='dash-label'>Ganhos</span><div class='dash-val' style='color:var(--up)' id='lRec'>R$ 0</div></div>
            <div style='text-align:right'><span class='dash-label'>Gastos</span><div class='dash-val' style='color:var(--down)' id='lDesp'>R$ 0</div></div>
        </div>
        <div style='border-top:1px solid rgba(255,255,255,0.05); pt:15px; margin-top:15px; padding-top:15px'>
            <span class='dash-label'>Saldo Disponível</span>
            <div class='dash-val' style='font-size:2rem' id='lSaldo'>R$ 0</div>
        </div>
    </div>

    <div class='card-inner'>
        <div class='input-group'><i class='lucide-shopping-bag'></i><input type='text' id='fDesc' placeholder='Ex: Supermercado'></div>
        <div style='display:flex; gap:10px; margin-bottom:12px'>
            <div class='input-group' style='flex:1'><i class='lucide-dollar-sign'></i><input type='number' id='fVal' placeholder='0,00'></div>
            <div class='input-group' style='flex:1'><i class='lucide-tag'></i>
                <select id='fCat'>
                    <option value='Geral'>📁 Geral</option>
                    <option value='Alimentação'>🍕 Alimentação</option>
                    <option value='Moradia'>🏠 Moradia</option>
                    <option value='Lazer'>🎮 Lazer</option>
                    <option value='Saúde'>💊 Saúde</option>
                    <option value='Salário'>💰 Salário</option>
                </select>
            </div>
        </div>
        <div style='display:flex; gap:10px'>
            <button class='btn-main' style='background:var(--up); color:black' onclick='add("rec")'>Receber</button>
            <button class='btn-main' style='background:var(--down)' onclick='add("desp")'>Gastar</button>
        </div>
    </div>

    <div class='search-box'><div class='input-group'><i class='lucide-search'></i><input type='text' id='fSearch' placeholder='Procurar lançamento...' oninput='render()'></div></div>
    <div id='lList'></div>
</div>

<!-- 2. CONTAS -->
<div id='view-pendencias' class='tab-content'>
    <div class='dash-main' style='border-color:var(--warn)'>
        <span class='dash-label' style='color:var(--warn)'>Previsão de Saída</span>
        <div class='dash-val' style='font-size:2rem; color:var(--warn)' id='pTotal'>R$ 0</div>
    </div>
    <div class='card-inner' style='border-color:var(--warn)'>
        <div class='input-group'><i class='lucide-clock'></i><input type='text' id='pDesc' placeholder='Nome da conta'></div>
        <div class='input-group'><i class='lucide-dollar-sign'></i><input type='number' id='pVal' placeholder='Valor R$'></div>
        <button class='btn-main' style='background:var(--warn); color:black' onclick='addPend()'>Agendar Pendência</button>
    </div>
    <div id='pList'></div>
</div>

<!-- (REMAINDING VIEWS) -->
<div id='view-graficos' class='tab-content'><div id='cBox'></div></div>
<div id='view-ia' class='tab-content'><div id='iaBox' class='card-inner'></div></div>
<div id='view-anual' class='tab-content'><div id='aBox'></div></div>
<div id='view-metas' class='tab-content'>
    <div class='card-inner'>
        <span class='dash-label'>Nova Meta</span>
        <input type='text' id='mNome' placeholder='Nome'>
        <input type='number' id='mAlvo' placeholder='Alvo R$'>
        <button class='btn-main' style='background:var(--primary); margin-top:10px' onclick='addGoal()'>Fixar Meta</button>
    </div>
    <div id='mBox'></div>
</div>
<div id='view-simular' class='tab-content'><div id='sBox' class='card-inner' style='text-align:center'></div></div>

<nav class='bottom-nav'>
    <div class='nav-item active' onclick='switchTab("lancar")'><i class='lucide-plus-circle'></i><span>Lançar</span></div>
    <div class='nav-item' onclick='switchTab("pendencias")'><i class='lucide-clock'></i><span>Contas</span></div>
    <div class='nav-item' onclick='switchTab("graficos")'><i class='lucide-bar-chart-big'></i><span>Graf</span></div>
    <div class='nav-item' onclick='switchTab("ia")'><i class='lucide-sparkles'></i><span>IA</span></div>
    <div class='nav-item' onclick='switchTab("anual")'><i class='lucide-calendar'></i><span>Anual</span></div>
    <div class='nav-item' onclick='switchTab("metas")'><i class='lucide-target'></i><span>Metas</span></div>
    <div class='nav-item' onclick='switchTab("simular")'><i class='lucide-scale'></i><span>Sim</span></div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('zapia_ultra_v12')) || { items: [], goals: [] };

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + t).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('viewTitle').innerText = t.charAt(0).toUpperCase() + t.slice(1);
        render();
    }

    function add(tipo) {
        const d = document.getElementById('fDesc').value, v = parseFloat(document.getElementById('fVal').value), c = document.getElementById('fCat').value;
        if(!d || isNaN(v)) return;
        db.items.unshift({ id: Date.now(), desc: d, val: v, tipo: tipo, cat: c, mes: 'Jul' });
        document.getElementById('fDesc').value = ''; document.getElementById('fVal').value = '';
        save();
    }

    function addPend() {
        const d = document.getElementById('pDesc').value, v = parseFloat(document.getElementById('pVal').value);
        if(!d || isNaN(v)) return;
        db.items.unshift({ id: Date.now(), desc: d, val: v, tipo: 'pend', cat: 'Pendência', mes: 'Jul' });
        document.getElementById('pDesc').value = ''; document.getElementById('pVal').value = '';
        save();
    }

    function addGoal() {
        const n = document.getElementById('mNome').value, a = parseFloat(document.getElementById('mAlvo').value);
        if(!n || isNaN(a)) return;
        db.goals.push({ id: Date.now(), nome: n, alvo: a });
        save();
    }

    function del(id) { db.items = db.items.filter(x => x.id !== id); save(); }
    function pay(id) { const i = db.items.find(x => x.id === id); i.tipo = 'desp'; save(); }

    function save() { localStorage.setItem('zapia_ultra_v12', JSON.stringify(db)); render(); }

    function render() {
        let rec = 0, desp = 0, pnd = 0;
        const q = document.getElementById('fSearch').value.toLowerCase();
        const lList = document.getElementById('lList'); lList.innerHTML = '';
        const pList = document.getElementById('pList'); pList.innerHTML = '';

        db.items.forEach(i => {
            if(i.tipo === 'rec') rec += i.val;
            else if(i.tipo === 'desp') desp += i.val;
            else if(i.tipo === 'pend') pnd += i.val;

            if(q && !i.desc.toLowerCase().includes(q)) return;

            const color = i.tipo === 'rec' ? 'var(--up)' : (i.tipo === 'pend' ? 'var(--warn)' : 'var(--down)');
            const html = `
                <div class='item-card'>
                    <div class='item-icon' style='color:${color}'><i class='lucide-${i.tipo==='rec'?'trending-up':'trending-down'}'></i></div>
                    <div class='item-info'>
                        <div class='item-title'>${i.desc}</div>
                        <span class='cat-chip'>${i.cat || 'Geral'}</span>
                    </div>
                    <div class='item-val' style='color:${color}'>
                        R$ ${i.val.toLocaleString()}
                        ${i.tipo==='pend'?`<br><button onclick='pay(${i.id})' style='font-size:0.5rem; background:var(--up); border:none; padding:3px 6px; border-radius:5px; margin-top:4px'>PAGAR</button>`:''}
                    </div>
                    <button class='btn-del' onclick='del(${i.id})'><i class='lucide-trash-2' style='width:14px'></i></button>
                </div>`;
            if(i.tipo === 'pend') pList.innerHTML += html; else lList.innerHTML += html;
        });

        const bal = rec - desp;
        document.getElementById('lRec').innerText = 'R$ ' + rec.toLocaleString();
        document.getElementById('lDesp').innerText = 'R$ ' + desp.toLocaleString();
        document.getElementById('lSaldo').innerText = 'R$ ' + bal.toLocaleString();
        document.getElementById('pTotal').innerText = 'R$ ' + pnd.toLocaleString();

        // Anual, Metas, IA, Simular logic remains but refreshed
        document.getElementById('iaBox').innerHTML = `<h3 style='margin-bottom:10px'>Relatório IA</h3><p style='color:var(--muted); font-size:0.9rem'>${bal >= pnd ? 'Saúde financeira boa. Você possui saldo para quitar todas as pendências.' : 'Atenção: Suas pendências superam seu saldo disponível.'}</p>`;
        document.getElementById('sBox').innerHTML = `<h3>Se pagar tudo hoje:</h3><div style='font-size:2.2rem; font-weight:800; color:${(bal-pnd)<0?'var(--down)':'var(--up)'}'>R$ ${(bal-pnd).toLocaleString()}</div>`;
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'backup_zapia_finance.json'; a.click();
    }

    render();
</script>
</body>
</html>
