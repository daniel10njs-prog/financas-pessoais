<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Finanças Pessoais</title>
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --verde: #22c55e; --vermelho: #ef4444; --amarelo: #f59e0b; --azul: #3b82f6;
  --bg: #0f172a; --card: #1e293b; --card2: #253047; --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; max-width: 480px; margin: 0 auto; padding-bottom: 90px; min-height: 100vh; overflow-x: hidden; }
header { padding: 18px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1.1rem; font-weight: 700; }
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 5px 8px; font-size: .7rem; cursor: pointer; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); overflow-x: auto; }
.bottom-nav button { flex: 1; min-width: 65px; padding: 12px 0; background: none; border: none; color: var(--muted); font-size: .6rem; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bottom-nav button.active { color: var(--azul); }
.content-section { display: none; padding: 14px 12px; }
.content-section.active { display: block; }
.cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.card { background: var(--card); border-radius: 12px; padding: 12px 10px; border: 1px solid var(--border); text-align: center; }
.card .label { font-size: .6rem; text-transform: uppercase; color: var(--muted); }
.card .value { font-size: .9rem; font-weight: 700; }
.card.rec .value { color: var(--verde); } .card.desp .value { color: var(--vermelho); } .card.saldo .value { color: var(--azul); }
.real-card { background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--azul); margin-bottom: 16px; padding: 12px; border-radius: 12px; text-align: center; }
.real-card .label { font-size: .7rem; color: var(--azul); font-weight: 700; }
.real-card .value { font-size: 1.1rem; font-weight: 800; }
.action-buttons { display: flex; gap: 10px; margin-bottom: 16px; }
.btn-action { flex: 1; padding: 14px; border-radius: 12px; border: none; color: #fff; font-size: .9rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-action.plus { background: var(--verde); }
.btn-action.minus { background: var(--vermelho); }
.btn-action.pend { background: var(--amarelo); }
.list { display: flex; flex-direction: column; gap: 10px; }
.item { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
.item-icon { font-size: 1.1rem; background: var(--card2); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
.item-text b { font-size: .85rem; display: block; }
.item-text span { font-size: .65rem; color: var(--muted); }
.item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.item-val { font-weight: 700; font-size: 0.9rem; }
.item-val.receita { color: var(--verde); } .item-val.despesa { color: var(--vermelho); } .item-val.pendencia { color: var(--amarelo); }
.item-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 4px; font-size: 0.85rem; }
.icon-btn.edit { color: var(--azul); }
.icon-btn.delete { color: var(--vermelho); }
.btn-pay-direct { background: var(--verde); color: white; border: none; border-radius: 6px; padding: 4px 8px; font-size: 0.6rem; font-weight: 800; cursor: pointer; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 20px; padding: 20px; width: 100%; max-width: 380px; border: 1px solid var(--border); }
.modal h2 { margin-bottom: 18px; font-size: 1rem; text-align: center; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: .65rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
.form-group input, .form-group select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: #fff; font-size: .9rem; outline: none; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-save { flex: 1; padding: 12px; border-radius: 8px; border: none; background: var(--azul); color: #fff; font-weight: 700; cursor: pointer; }
.btn-cancel { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--muted); font-weight: 600; cursor: pointer; }
.widget { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.widget-title { font-size: .7rem; font-weight: 700; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }
.progress-bar { height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; background: var(--verde); width: 0%; transition: width 0.5s; }
.comp-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 5px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .75rem; align-items: center; }
.comp-header { font-weight: 800; color: var(--muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
.sim-check { width: 22px; height: 22px; cursor: pointer; }
</style>
</head>
<body>
<header><h1>💰 Finanças</h1><button class="sync-btn" onclick="exportCSV()">📊 CSV</button></header>

<section id="sec-lancamentos" class="content-section active">
  <div class="cards">
    <div class="card rec"><div class="label">Receitas</div><div class="value" id="totalRec">R$ 0</div></div>
    <div class="card desp"><div class="label">Despesas</div><div class="value" id="totalDesp">R$ 0</div></div>
    <div class="card saldo"><div class="label">Saldo</div><div class="value" id="saldo">R$ 0</div></div>
  </div>
  <div class="real-card"><div class="label">Líquido Real</div><div class="value" id="saldoReal">R$ 0,00</div></div>
  <div class="action-buttons">
    <button class="btn-action plus" onclick="openModal('receita')">＋ Receita</button>
    <button class="btn-action minus" onclick="openModal('despesa')">－ Despesa</button>
  </div>
  <div class="list" id="list"></div>
</section>

<section id="sec-pendencias" class="content-section">
  <div class="widget" style="background: rgba(245, 158, 11, 0.05); border-color: var(--amarelo); text-align:center;">
    <div class="widget-title" style="color: var(--amarelo);">Total Pendente</div>
    <div id="totalPendValue" style="font-size:1.4rem; font-weight:800; color: var(--amarelo);">R$ 0,00</div>
  </div>
  <button class="btn-action pend" style="width:100%; margin-bottom:14px;" onclick="openModal('pendencia')">＋ Nova Pendência</button>
  <div class="list" id="listPend"></div>
</section>

<section id="sec-comparativo" class="content-section">
  <div class="widget">
    <div class="widget-title">Histórico Mensal</div>
    <div class="comp-row comp-header">
      <div>Mês</div><div>Rec</div><div>Desp</div><div>Real</div>
    </div>
    <div id="compList"></div>
  </div>
</section>

<section id="sec-simular" class="content-section">
  <div class="widget" style="border-color: var(--verde);">
    <div class="widget-title" style="color: var(--verde);">Simulação de Caixa</div>
    <div class="form-group"><label>Saldo/Recebimentos Previstos (R$)</label><input id="simSaldo" type="number" value="0" oninput="renderSim()"></div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; background:var(--card2); padding:10px; border-radius:10px;">
      <span style="font-size:.75rem; font-weight:700;">RESTANTE:</span>
      <b id="simRestante" style="font-size:1.1rem; color:var(--verde);">R$ 0,00</b>
    </div>
  </div>
  <div class="widget-title">Selecionar Pendências</div>
  <div id="simList" class="list"></div>
</section>

<section id="sec-metas" class="content-section">
  <button class="btn-action plus" style="width:100%; margin-bottom:14px;" onclick="openMetaModal()">＋ Criar Meta</button>
  <div id="metasList" class="list"></div>
</section>

<section id="sec-analise" class="content-section">
  <div class="widget" style="text-align:center;"><canvas id="myChart" style="max-height:280px;"></canvas></div>
</section>

<nav class="bottom-nav">
  <button id="nav-lancamentos" class="active" onclick="setTab('lancamentos')"><i class="fas fa-list-ul"></i>Lançamentos</button>
  <button id="nav-pendencias" onclick="setTab('pendencias')"><i class="fas fa-clock"></i>Pendências</button>
  <button id="nav-comparativo" onclick="setTab('comparativo')"><i class="fas fa-history"></i>Mensal</button>
  <button id="nav-simular" onclick="setTab('simular')"><i class="fas fa-calculator"></i>Simular</button>
  <button id="nav-metas" onclick="setTab('metas')"><i class="fas fa-bullseye"></i>Metas</button>
  <button id="nav-analise" onclick="setTab('analise')"><i class="fas fa-chart-pie"></i>Análise</button>
</nav>

<div class="modal-overlay" id="modalEntry"><div class="modal"><h2 id="modalTitle">Lançamento</h2><input type="hidden" id="editId"><input type="hidden" id="editType"><div class="form-group"><label>Descrição</label><input id="desc" type="text"></div><div class="form-group"><label>Valor (R$)</label><input id="val" type="number" step="0.01"></div><div class="form-group"><label>Tipo / Categoria</label><select id="tipoSub"></select></div><div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="saveEntry()">Salvar</button></div></div></div>
<div class="modal-overlay" id="modalMeta"><div class="modal"><h2>Nova Meta</h2><div class="form-group"><label>Nome da Meta</label><input id="metaNome" type="text"></div><div class="form-group"><label>Valor Pretendido (R$)</label><input id="metaPretendido" type="number" step="0.01"></div><div class="modal-actions"><button class="btn-cancel" onclick="closeMetaModal()">Cancelar</button><button class="btn-save" onclick="saveMeta()">Criar</button></div></div></div>
<div class="modal-overlay" id="modalAddMeta"><div class="modal"><h2>Adicionar à Meta</h2><input type="hidden" id="addMetaId"><div class="form-group"><label>Valor a Guardar (R$)</label><input id="valAddMeta" type="number" step="0.01"></div><div class="modal-actions"><button class="btn-cancel" onclick="closeAddMetaModal()">Cancelar</button><button class="btn-save" onclick="confirmAddMeta()">Adicionar</button></div></div></div>

<script>
let db = JSON.parse(localStorage.getItem('zapia_financas_db')) || { items: [], pendencias: [], metas: [] };
let simChecks = {}; 
const icons = { 'Salário': '💰', 'Pix Recebido': '💸', 'Ajuste': '⚙️', 'Alimentação': '🍽️', 'Transporte': '🚗', 'Moradia': '🏠', 'Lazer': '🎡', 'Saúde': '🏥', 'Educação': '📚', 'Assinaturas': '📺', 'Outros': '📦' };
const categorias = { 'receita': ['Salário', 'Pix Recebido', 'Ajuste'], 'despesa': ['Alimentação', 'Transporte', 'Moradia', 'Lazer', 'Saúde', 'Ajuste', 'Outros'], 'pendencia': ['Moradia', 'Educação', 'Assinaturas', 'Saúde', 'Outros'] };

function save() { localStorage.setItem('zapia_financas_db', JSON.stringify(db)); render(); }
function setTab(t) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  document.getElementById('nav-'+t).classList.add('active');
  if(t==='analise') initChart();
  render();
}
function openModal(mode, id = null) {
  const select = document.getElementById('tipoSub'); select.innerHTML = '';
  categorias[mode === 'pendencia' ? 'pendencia' : (mode === 'receita' ? 'receita' : 'despesa')].forEach(cat => select.innerHTML += `<option value="${cat}">${cat}</option>`);
  document.getElementById('editType').value = mode;
  if(id) {
    const list = mode === 'pendencia' ? db.pendencias : db.items;
    const item = list.find(x => x.id === id);
    document.getElementById('modalTitle').innerText = 'Editar';
    document.getElementById('editId').value = id; document.getElementById('desc').value = item.desc; document.getElementById('val').value = item.val; document.getElementById('tipoSub').value = item.sub;
  } else {
    document.getElementById('modalTitle').innerText = mode==='receita'?'Nova Receita':(mode==='despesa'?'Nova Despesa':'Nova Pendência');
    document.getElementById('editId').value = ''; document.getElementById('desc').value = ''; document.getElementById('val').value = '';
  }
  document.getElementById('modalEntry').classList.add('show');
}
function closeModal() { document.getElementById('modalEntry').classList.remove('show'); }
function saveEntry() {
  const d = document.getElementById('desc').value, v = parseFloat(document.getElementById('val').value), s = document.getElementById('tipoSub').value, id = document.getElementById('editId').value, type = document.getElementById('editType').value;
  if(!d || !v) return;
  if(type === 'pendencia') {
    if(id) { const idx = db.pendencias.findIndex(x => x.id == id); db.pendencias[idx] = { ...db.pendencias[idx], desc: d, val: v, sub: s }; }
    else db.pendencias.push({ id: Date.now(), desc: d, val: v, sub: s });
  } else {
    if(id) { const idx = db.items.findIndex(x => x.id == id); db.items[idx] = { ...db.items[idx], desc: d, val: v, sub: s }; }
    else db.items.push({ id: Date.now(), desc: d, val: v, tipo: type, sub: s, data: new Date().toISOString() });
  }
  save(); closeModal();
}
function deleteItem(id, type, event) {
  event.stopPropagation();
  if(type === 'pendencia') db.pendencias = db.pendencias.filter(x => x.id != id);
  else if(type === 'meta') db.metas = db.metas.filter(x => x.id != id);
  else db.items = db.items.filter(x => x.id != id);
  save();
}
function directPay(id, event) {
  event.stopPropagation();
  const p = db.pendencias.find(x => x.id == id);
  db.items.push({ id: Date.now(), desc: p.desc, val: p.val, tipo: 'despesa', sub: p.sub, data: new Date().toISOString() });
  db.pendencias = db.pendencias.filter(x => x.id != id);
  save();
}
function renderSim() {
  const input = parseFloat(document.getElementById('simSaldo').value) || 0;
  let totalSim = 0;
  db.pendencias.forEach(p => { if(simChecks[p.id] !== false) totalSim += p.val; });
  const rest = input - totalSim;
  const el = document.getElementById('simRestante');
  el.innerText = 'R$ ' + rest.toLocaleString('pt-BR');
  el.style.color = rest >= 0 ? 'var(--verde)' : 'var(--vermelho)';
  const sl = document.getElementById('simList'); sl.innerHTML = '';
  db.pendencias.forEach(p => {
    const isChecked = simChecks[p.id] !== false;
    sl.innerHTML += `<div class="item" onclick="toggleSim(${p.id})"><div class="item-info"><div class="item-icon">${icons[p.sub]||'⏳'}</div><div class="item-text"><b>${p.desc}</b><span>${p.sub}</span></div></div><div class="item-right"><b class="item-val pendencia">R$ ${p.val.toFixed(2)}</b><input type="checkbox" class="sim-check" ${isChecked?'checked':''}></div></div>`;
  });
}
function toggleSim(id) { simChecks[id] = simChecks[id] === false ? true : false; renderSim(); }
function renderComp() {
  const months = {};
  db.items.forEach(i => {
    const m = new Date(i.data).toLocaleDateString('pt-BR', {month:'short', year:'2-digit'}).toUpperCase();
    if(!months[m]) months[m] = {r:0, d:0};
    if(i.tipo==='receita') months[m].r += i.val; else months[m].d += i.val;
  });
  const cl = document.getElementById('compList'); cl.innerHTML = '';
  Object.keys(months).reverse().forEach(m => {
    const r = months[m].r, d = months[m].d, real = r - d;
    cl.innerHTML += `<div class="comp-row"><div>${m}</div><div style="color:var(--verde)">${r.toFixed(0)}</div><div style="color:var(--vermelho)">${d.toFixed(0)}</div><div style="font-weight:700; color:${real>=0?'var(--azul)':'var(--vermelho)'}">${real.toFixed(0)}</div></div>`;
  });
}
function render() {
  let r=0, d=0, p=0; db.items.forEach(i => i.tipo==='receita'? r+=i.val : d+=i.val); db.pendencias.forEach(i => p+=i.val);
  document.getElementById('totalRec').innerText = 'R$ '+r.toLocaleString('pt-BR');
  document.getElementById('totalDesp').innerText = 'R$ '+d.toLocaleString('pt-BR');
  document.getElementById('saldo').innerText = 'R$ '+(r-d).toLocaleString('pt-BR');
  document.getElementById('saldoReal').innerText = 'R$ '+(r-d).toLocaleString('pt-BR');
  document.getElementById('totalPendValue').innerText = 'R$ '+p.toLocaleString('pt-BR');
  const l = document.getElementById('list'); l.innerHTML = '';
  db.items.slice().reverse().forEach(i => { l.innerHTML += `<div class="item"><div class="item-info"><div class="item-icon">${icons[i.sub]||'📦'}</div><div class="item-text"><b>${i.desc}</b><span>${i.sub}</span></div></div><div class="item-right"><b class="item-val ${i.tipo}">${i.tipo==='receita'?'+':'-'} R$ ${i.val.toFixed(2)}</b><div class="item-actions"><button class="icon-btn edit" onclick="openModal('${i.tipo}', ${i.id})"><i class="fas fa-pencil-alt"></i></button><button class="icon-btn delete" onclick="deleteItem(${i.id}, '${i.tipo}', event)"><i class="fas fa-trash-alt"></i></button></div></div></div>`; });
  const lp = document.getElementById('listPend'); lp.innerHTML = '';
  db.pendencias.forEach(i => { lp.innerHTML += `<div class="item"><div class="item-info"><div class="item-icon">${icons[i.sub]||'⏳'}</div><div class="item-text"><b>${i.desc}</b><span>${i.sub}</span></div></div><div class="item-right"><b class="item-val pendencia">R$ ${i.val.toFixed(2)}</b><div class="item-actions"><button class="btn-pay-direct" onclick="directPay(${i.id}, event)">Pagar</button><button class="icon-btn edit" onclick="openModal('pendencia', ${i.id})"><i class="fas fa-pencil-alt"></i></button><button class="icon-btn delete" onclick="deleteItem(${i.id}, 'pendencia', event)"><i class="fas fa-trash-alt"></i></button></div></div></div>`; });
  const ml = document.getElementById('metasList'); ml.innerHTML = '';
  db.metas.forEach(m => {
    const perc = Math.min((m.acumulado / m.pretendido) * 100, 100).toFixed(1);
    ml.innerHTML += `<div class="widget"><div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;"><div><b style="font-size:.9rem; color:var(--azul);">${m.nome}</b><div style="font-size:.7rem; color:var(--muted);">Meta: R$ ${m.pretendido.toLocaleString('pt-BR')}</div></div><div style="text-align:right;"><b style="font-size:1rem;">R$ ${m.acumulado.toLocaleString('pt-BR')}</b><div style="font-size:.7rem; color:var(--verde);">${perc}%</div></div></div><div class="progress-bar"><div class="progress-fill" style="width:${perc}%;"></div></div><div style="display:flex; gap:10px; margin-top:15px;"><button class="sync-btn" style="flex:1; color:var(--verde); border-color:var(--verde);" onclick="openAddMeta(${m.id})">ADICIONAR</button><button class="icon-btn delete" onclick="deleteItem(${m.id}, 'meta', event)"><i class="fas fa-trash-alt"></i></button></div></div>`;
  });
  renderComp(); renderSim();
}
function openMetaModal() { document.getElementById('modalMeta').classList.add('show'); }
function closeMetaModal() { document.getElementById('modalMeta').classList.remove('show'); }
function saveMeta() {
  const n = document.getElementById('metaNome').value, p = parseFloat(document.getElementById('metaPretendido').value);
  if(!n || !p) return; db.metas.push({ id: Date.now(), nome: n.toUpperCase(), pretendido: p, acumulado: 0 }); save(); closeMetaModal();
}
function openAddMeta(id) { document.getElementById('addMetaId').value = id; document.getElementById('modalAddMeta').classList.add('show'); }
function closeAddMetaModal() { document.getElementById('modalAddMeta').classList.remove('show'); }
function confirmAddMeta() {
  const id = document.getElementById('addMetaId').value, v = parseFloat(document.getElementById('valAddMeta').value);
  if(!v) return; const idx = db.metas.findIndex(x => x.id == id); db.metas[idx].acumulado += v; save(); closeAddMetaModal();
}
function initChart() {
  const ctx = document.getElementById('myChart').getContext('2d'); if(chartInstance) chartInstance.destroy();
  const totals = {}; db.items.filter(i=>i.tipo==='despesa').forEach(i => totals[i.sub] = (totals[i.sub]||0) + i.val);
  chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b', '#22c55e', '#8b5cf6', '#ec4899'] }] }, options: { plugins: { legend: { position: 'bottom', labels: { color: '#f1f5f9', font: {size: 10} } } } } });
}
let chartInstance = null;
function exportCSV() {
  let csv = 'Data,Tipo,Descricao,Categoria,Valor\n'; db.items.forEach(i => { csv += `${new Date(i.data).toLocaleDateString()},${i.tipo},${i.desc},${i.sub},${i.val}\n`; });
  const blob = new Blob([csv], { type: 'text/csv' }); const url = window.URL.createObjectURL(blob); const a = document.createElement('a'); a.setAttribute('hidden', ''); a.setAttribute('href', url); a.setAttribute('download', 'financas.csv'); document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
window.onload = render;
</script>
</body>
</html>
