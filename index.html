<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance Pro - v7.0</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/icon?family=Material+Icons+Round' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --primary: #3b82f6; --text: #f8fafc;
            --muted: #94a3b8; --up: #10b981; --down: #ef4444; --warn: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; max-width: 500px; margin: 0 auto; overflow-x: hidden; min-height: 100vh; }
        
        /* Layout */
        header { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .h-info h1 { font-size: 1.4rem; font-weight: 700; }
        .h-info p { font-size: 0.8rem; color: var(--muted); }
        .tab-content { display: none; padding: 0 20px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Elements */
        .total-card { padding: 25px; border-radius: 28px; border: 2px solid transparent; margin-bottom: 25px; position: relative; }
        .tc-blue { background: #161b2c; border-color: var(--primary); }
        .tc-yellow { background: #161b2c; border-color: var(--warn); }
        .tc-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .tc-val { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        
        .list { display: flex; flex-direction: column; gap: 12px; }
        .item { background: #161b2c; padding: 18px; border-radius: 24px; display: flex; align-items: center; gap: 15px; border: 1px solid #1e293b; }
        .item-icon { width: 48px; height: 48px; background: #1e293b; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .item-content { flex: 1; }
        .item-title { font-size: 0.95rem; font-weight: 700; }
        .item-side { text-align: right; }
        .item-price { font-size: 1rem; font-weight: 700; }
        
        .form-box { background: #161b2c; padding: 20px; border-radius: 24px; border: 1px solid #1e293b; }
        input, select { width: 100%; padding: 16px; background: #0b0f1a; border: 1px solid #1e293b; border-radius: 12px; color: white; margin-bottom: 12px; font-size: 1rem; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 800; font-size: 1rem; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #0b0f1a; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 15px 5px 35px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; cursor: pointer; position: relative; }
        .nav-item i { font-size: 1.4rem; }
        .nav-item span { font-size: 0.6rem; font-weight: 600; }
        .nav-item.active { color: #38bdf8; }
        .nav-badge { position: absolute; top: -5px; right: -5px; background: var(--down); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; border: 2px solid var(--bg); font-weight: 800; }

        /* Simple Chart */
        .chart-box { height: 200px; display: flex; align-items: flex-end; gap: 10px; padding: 20px; background: #161b2c; border-radius: 24px; margin-bottom: 20px; }
        .bar { flex: 1; border-radius: 5px 5px 0 0; background: var(--primary); transition: height 0.5s; position: relative; }
        .bar::after { content: attr(data-label); position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: var(--muted); }
    </style>
</head>
<body>

<header>
    <div class='h-info'>
        <h1 id='viewTitle'>Lançar</h1>
        <p id='viewDate'>Julho de 2026</p>
    </div>
</header>

<!-- TAB: LANÇAR -->
<div id='view-lancar' class='tab-content active'>
    <div class='form-box'>
        <input type='text' id='fDesc' placeholder='O que é? (ex: Aluguel)'>
        <input type='number' id='fVal' placeholder='Valor R$'>
        <select id='fTipo'>
            <option value='desp'>Gasto (Saída)</option>
            <option value='rec'>Ganho (Entrada)</option>
            <option value='pend'>Pendência (Pagar depois)</option>
        </select>
        <button class='btn-main' onclick='add()'>SALVAR REGISTRO</button>
    </div>
    <div style='margin-top: 30px;' id='recentList'></div>
</div>

<!-- TAB: CONTAS -->
<div id='view-contas' class='tab-content'>
    <div class='total-card tc-yellow'>
        <span class='tc-label'>Total a Pagar</span>
        <div class='tc-val' id='pendTotal'>R$ 0,00</div>
    </div>
    <div class='list' id='pendList'></div>
</div>

<!-- TAB: GRÁFICOS -->
<div id='view-graficos' class='tab-content'>
    <div class='chart-box' id='chartBars'></div>
    <div class='total-card tc-blue'>
        <span class='tc-label'>Saldo Real</span>
        <div class='tc-val' id='realBal'>R$ 0,00</div>
    </div>
</div>

<!-- TAB: IA -->
<div id='view-ia' class='tab-content'>
    <div class='form-box' style='text-align: center;'>
        <i class='lucide-sparkles' style='font-size: 3rem; color: #38bdf8; margin-bottom: 20px;'></i>
        <h2>Zapia IA</h2>
        <p style='color: var(--muted); margin: 15px 0;'>Analisei suas finanças. Você tem R$ <span id='iaPend'>0</span> em pendências para este mês.</p>
        <button class='btn-main' style='background: #1e293b'>GERAR RELATÓRIO</button>
    </div>
</div>

<nav class='bottom-nav'>
    <div class='nav-item active' onclick='switchTab("lancar")'>
        <i class='lucide-layout-grid'></i><span>Lançar</span>
    </div>
    <div class='nav-item' onclick='switchTab("contas")'>
        <i class='lucide-clock'></i><span>Contas</span>
        <div class='nav-badge' id='badgeContas'>0</div>
    </div>
    <div class='nav-item' onclick='switchTab("graficos")'>
        <i class='lucide-pie-chart'></i><span>Gráficos</span>
    </div>
    <div class='nav-item' onclick='switchTab("ia")'>
        <i class='lucide-sparkles'></i><span>IA</span>
    </div>
    <div class='nav-item'>
        <i class='lucide-calendar-days'></i><span>Anual</span>
    </div>
    <div class='nav-item'>
        <i class='lucide-target'></i><span>Metas</span>
    </div>
    <div class='nav-item'>
        <i class='lucide-scale'></i><span>Simular</span>
    </div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('zapia_pro_v7')) || [];

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById('view-' + tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        const titles = { lancar: 'Lançar', contas: 'Pendências', graficos: 'Análise', ia: 'Zapia IA' };
        document.getElementById('viewTitle').innerText = titles[tabId];
        render();
    }

    function add() {
        const desc = document.getElementById('fDesc').value;
        const val = parseFloat(document.getElementById('fVal').value);
        const tipo = document.getElementById('fTipo').value;
        if(!desc || isNaN(val)) return;

        db.unshift({ id: Date.now(), desc, val, tipo, date: '20/07' });
        document.getElementById('fDesc').value = '';
        document.getElementById('fVal').value = '';
        localStorage.setItem('zapia_pro_v7', JSON.stringify(db));
        render();
    }

    function pay(id) {
        const item = db.find(i => i.id === id);
        item.tipo = 'desp';
        localStorage.setItem('zapia_pro_v7', JSON.stringify(db));
        render();
    }

    function render() {
        let bal = 0, pndTotal = 0, pndCount = 0;
        const pList = document.getElementById('pendList');
        const rList = document.getElementById('recentList');
        pList.innerHTML = '';
        if(rList) rList.innerHTML = '<h3 style="margin-bottom:15px">Recentes</h3>';

        db.forEach(i => {
            if(i.tipo === 'rec') bal += i.val;
            else if(i.tipo === 'desp') bal -= i.val;
            else if(i.tipo === 'pend') {
                pndTotal += i.val;
                pndCount++;
                pList.innerHTML += `
                    <div class='item'>
                        <div class='item-icon' style='color:var(--warn)'><i class='lucide-clock'></i></div>
                        <div class='item-content'>
                            <div class='item-title'>${i.desc}</div>
                            <div style='font-size:0.7rem; color:var(--muted)'>${i.date} • PENDENTE</div>
                        </div>
                        <div class='item-side'>
                            <div class='item-price' style='color:var(--warn)'>R$ ${i.val.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
                            <button onclick='pay(${i.id})' style='background:var(--up); border:none; padding:5px 10px; border-radius:8px; font-weight:800; font-size:0.6rem'>PAGAR</button>
                        </div>
                    </div>
                `;
            }

            if(rList && db.indexOf(i) < 5) {
                rList.innerHTML += `<div style="font-size:0.8rem; margin-bottom:8px; display:flex; justify-content:space-between">
                    <span>${i.desc}</span> <span style="color:${i.tipo==='rec'?'var(--up)':'white'}">R$ ${i.val}</span>
                </div>`;
            }
        });

        document.getElementById('pendTotal').innerText = 'R$ ' + pndTotal.toLocaleString('pt-BR',{minimumFractionDigits:2});
        document.getElementById('badgeContas').innerText = pndCount;
        document.getElementById('realBal').innerText = 'R$ ' + bal.toLocaleString('pt-BR',{minimumFractionDigits:2});
        if(document.getElementById('iaPend')) document.getElementById('iaPend').innerText = pndTotal.toLocaleString('pt-BR');

        // Simple Chart update
        const chart = document.getElementById('chartBars');
        if(chart) {
            chart.innerHTML = '';
            const max = Math.max(bal, pndTotal, 100);
            const bars = [{l:'Saldo', v:bal, c:'var(--primary)'}, {l:'Pendente', v:pndTotal, c:'var(--warn)'}];
            bars.forEach(b => {
                const h = Math.max((b.v / max) * 100, 5);
                chart.innerHTML += `<div class='bar' data-label='${b.l}' style='height:${h}%; background:${b.c}'></div>`;
            });
        }
    }

    render();
</script>
</body>
</html>
