<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zapia Finance v3.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --primary: #3b82f6; --text: #f8fafc;
            --muted: #94a3b8; --up: #10b981; --down: #ef4444; --warn: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; max-width: 500px; margin: 0 auto; overflow-x: hidden; }
        
        header { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .card-main { margin: 0 20px 25px; padding: 25px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .bal-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .bal-val { font-size: 2.2rem; font-weight: 800; margin: 8px 0; }
        
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 25px; }
        .stat-box { padding: 15px; background: var(--card); border-radius: 18px; border: 1px solid rgba(255,255,255,0.03); }
        .stat-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 5px; }
        .stat-val { font-size: 1rem; font-weight: 700; }
        .stat-val.up { color: var(--up); }
        .stat-val.down { color: var(--down); }

        .chart-container { margin: 0 20px 25px; background: var(--card); border-radius: 24px; padding: 20px; height: 200px; position: relative; }

        .tabs { display: flex; gap: 10px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 10px 18px; background: var(--card); border-radius: 12px; font-size: 0.8rem; font-weight: 600; color: var(--muted); white-space: nowrap; border: 1px solid transparent; }
        .tab.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); border-color: var(--primary); }

        .list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .item { padding: 14px; background: var(--card); border-radius: 16px; display: flex; align-items: center; gap: 12px; }
        .icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .icon.up { background: rgba(16, 185, 129, 0.1); color: var(--up); }
        .icon.down { background: rgba(239, 68, 68, 0.1); color: var(--down); }
        .icon.pend { background: rgba(245, 158, 11, 0.1); color: var(--warn); }
        
        .item-info { flex: 1; }
        .item-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
        .item-meta { font-size: 0.7rem; color: var(--muted); }
        .item-val { font-size: 0.95rem; font-weight: 700; text-align: right; }

        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); z-index: 100; border: none; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--card); width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        input, select, textarea { width: 100%; padding: 15px; background: var(--bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; color: #fff; margin-bottom: 15px; font-size: 1rem; }
        .btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 14px; color: #fff; font-weight: 700; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">ZAPIA<span>.3.8</span></div>
    <div style="display:flex; gap:15px">
        <span class="material-icons-round" onclick="openImport()" style="color:var(--muted)">cloud_download</span>
        <span class="material-icons-round" style="color:var(--muted)">account_circle</span>
    </div>
</header>

<div class="card-main">
    <div class="bal-label">Saldo em Conta</div>
    <div class="bal-val" id="mainBalance">R$ 0,00</div>
</div>

<div class="stats-row">
    <div class="stat-box">
        <div class="stat-label">Ganhos</div>
        <div class="stat-val up" id="totalInc">R$ 0,00</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">Despesas</div>
        <div class="stat-val down" id="totalExp">R$ 0,00</div>
    </div>
</div>

<div class="chart-container">
    <canvas id="myChart"></canvas>
</div>

<div class="tabs">
    <div class="tab active" onclick="setTab('all', this)">Resumo</div>
    <div class="tab" onclick="setTab('rec', this)">Ganhos</div>
    <div class="tab" onclick="setTab('desp', this)">Gastos</div>
    <div class="tab" onclick="setTab('pend', this)">A Pagar</div>
</div>

<div class="list" id="mainList"></div>

<button class="fab" onclick="openModal()"><span class="material-icons-round">add</span></button>

<!-- MODAL ADD -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px">Nova Transação</h2>
        <input type="text" id="fDesc" placeholder="Descrição">
        <input type="number" id="fVal" placeholder="Valor (0.00)">
        <select id="fTipo">
            <option value="desp">Despesa</option>
            <option value="rec">Receita</option>
            <option value="pend">Pendência (A pagar)</option>
        </select>
        <button class="btn" onclick="add()">Salvar Registro</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--muted); margin-top:15px">Fechar</button>
    </div>
</div>

<!-- MODAL IMPORT -->
<div class="modal" id="importModal" style="align-items: center; padding: 20px;">
    <div class="modal-content" style="border-radius:24px">
        <h2 style="margin-bottom:15px">Importar Backup</h2>
        <textarea id="importBox" rows="8" placeholder="Cole o JSON aqui..."></textarea>
        <button class="btn" onclick="doImport()">Restaurar Dados</button>
        <button onclick="closeImport()" style="width:100%; background:none; border:none; color:var(--muted); margin-top:15px">Cancelar</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('zapia_38_db')) || { items: [], pends: [] };
    let activeTab = 'all';
    let myChart = null;

    function persist() { localStorage.setItem('zapia_38_db', JSON.stringify(db)); }
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function openImport() { document.getElementById('importModal').style.display = 'flex'; }
    function closeImport() { document.getElementById('importModal').style.display = 'none'; }

    function setTab(t, el) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function add() {
        const d = document.getElementById('fDesc').value;
        const v = parseFloat(document.getElementById('fVal').value);
        const t = document.getElementById('fTipo').value;
        if(!d || !v) return;
        
        const obj = { id: Date.now(), desc: d, val: v, tipo: t, data: new Date().toISOString().split('T')[0] };
        if(t === 'pend') db.pends.push(obj); else db.items.push(obj);
        
        persist(); closeModal(); render();
    }

    function doImport() {
        try {
            const raw = document.getElementById('importBox').value;
            const p = JSON.parse(raw);
            let items = [], pends = [];
            
            // Aceita formato {items: [], pends: []} ou array direto
            if(p.items) items = p.items; else if(Array.isArray(p)) items = p;
            if(p.pends) pends = p.pends;

            // Normaliza tipos (receita/receita -> rec, despesa -> desp)
            db.items = items.map(i => {
                let t = (i.tipo || '').toLowerCase();
                if(t.includes('rec')) t = 'rec'; else t = 'desp';
                return {...i, tipo: t};
            });
            db.pends = pends;

            persist(); closeImport(); render();
            alert('Backup restaurado com sucesso!');
        } catch(e) { alert('Erro no formato do backup.'); }
    }

    function del(id, isPend) {
        if(!confirm('Excluir?')) return;
        if(isPend) db.pends = db.pends.filter(x => x.id !== id);
        else db.items = db.items.filter(x => x.id !== id);
        persist(); render();
    }

    function render() {
        const list = document.getElementById('mainList');
        list.innerHTML = '';
        let inc = 0, exp = 0, pTotal = 0;

        db.items.forEach(i => { if(i.tipo === 'rec') inc += i.val; else exp += i.val; });
        db.pends.forEach(i => pTotal += i.val);

        document.getElementById('mainBalance').innerText = 'R$ ' + (inc - exp).toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('totalInc').innerText = 'R$ ' + inc.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('totalExp').innerText = 'R$ ' + exp.toLocaleString('pt-BR', {minimumFractionDigits:2});

        const filtered = [];
        if(activeTab === 'all' || activeTab === 'rec' || activeTab === 'desp') {
            db.items.filter(i => activeTab === 'all' || i.tipo === activeTab).forEach(i => filtered.push({...i, isPend: false}));
        }
        if(activeTab === 'all' || activeTab === 'pend') {
            db.pends.forEach(i => filtered.push({...i, tipo: 'pend', isPend: true}));
        }

        filtered.sort((a,b) => (b.data || b.venc || '').localeCompare(a.data || a.venc || '')).forEach(i => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="icon ${i.tipo === 'rec' ? 'up' : (i.tipo === 'desp' ? 'down' : 'pend')}">
                    <span class="material-icons-round">${i.tipo==='rec'?'add':(i.tipo==='desp'?'remove':'schedule')}</span>
                </div>
                <div class="item-info">
                    <div class="item-title">${i.desc}</div>
                    <div class="item-meta">${i.data || i.venc || ''}</div>
                </div>
                <div class="item-val" style="color:${i.tipo==='rec'?'var(--up)':(i.tipo==='desp'?'#fff':'var(--warn)')}">
                    R$ ${i.val.toLocaleString('pt-BR', {minimumFractionDigits:2})}
                    <div onclick="del(${i.id}, ${i.isPend})" style="font-size:9px; color:var(--muted); font-weight:400; margin-top:2px">EXCLUIR</div>
                </div>
            `;
            list.appendChild(div);
        });

        updateChart(inc, exp);
    }

    function updateChart(inc, exp) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Ganhos', 'Gastos'],
                datasets: [{
                    data: [inc, exp],
                    backgroundColor: ['#10b981', '#ef4444'],
                    borderWidth: 0,
                    cutout: '80%'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    render();
</script>
</body>
</html>
