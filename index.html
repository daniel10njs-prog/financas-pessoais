<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Zapia Finance Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --verde: #10b981; --verm: #ef4444; --amar: #f59e0b; --azul: #3b82f6;
  --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --border: rgba(148, 163, 184, 0.1);
  --text: #f8fafc; --muted: #94a3b8; --radius: 18px;
}
* { touch-action: pan-y; -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
html, body { overflow-x: hidden; width: 100vw; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
body { min-height: 100vh; max-width: 500px; margin: 0 auto; padding-bottom: 120px; }

header { height: 80px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
.logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.04em; color: var(--text); }
.logo span { color: var(--azul); }

.balance-section { margin: 24px 20px; padding: 32px 24px; background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%); border-radius: 28px; border: 1px solid var(--border); text-align: center; position: relative; overflow: hidden; }
.balance-label { font-size: 0.85rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.balance-val { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.06em; margin: 12px 0; color: #fff; }

.quick-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 0 20px 24px; }
.q-box { padding: 20px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
.q-label { font-size: 0.75rem; color: var(--muted); font-weight: 700; }
.q-val { font-size: 1.2rem; font-weight: 700; }
.q-val.up { color: var(--verde); }
.q-val.down { color: var(--verm); }

.section-title { padding: 0 24px 16px; display: flex; justify-content: space-between; align-items: center; }
.section-title h3 { font-size: 1.1rem; font-weight: 700; margin: 0; }

.item-list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
.item-card { padding: 16px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); display: flex; align-items: center; gap: 16px; transition: transform 0.2s; }
.item-card:active { transform: scale(0.98); }
.icon-wrap { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.icon-wrap.rec { background: rgba(16, 185, 129, 0.15); color: var(--verde); }
.icon-wrap.desp { background: rgba(239, 68, 68, 0.15); color: var(--verm); }
.item-body { flex: 1; }
.item-head { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
.item-sub { font-size: 0.75rem; color: var(--muted); }
.item-side { text-align: right; }
.item-amt { font-weight: 700; font-size: 1rem; }
.item-amt.rec { color: var(--verde); }

.fab { position: fixed; bottom: 32px; right: 24px; width: 64px; height: 64px; background: var(--azul); border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; border: none; box-shadow: 0 12px 24px rgba(59, 130, 246, 0.3); z-index: 1000; }

/* MODAL */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.sheet { background: #1e293b; width: 100%; max-width: 400px; border-radius: 28px; padding: 32px; border: 1px solid var(--border); }
.input-group { margin-bottom: 20px; }
.input-label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
input, select { width: 100%; padding: 16px; background: #0f172a; border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 1rem; }
.btn-main { width: 100%; padding: 18px; background: var(--azul); color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 1.1rem; margin-top: 10px; }

/* BACKUP UI */
.backup-zone { margin: 40px 20px; padding: 20px; border: 2px dashed var(--border); border-radius: 20px; text-align: center; }
.btn-restore { background: transparent; color: var(--azul); border: 1px solid var(--azul); padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="logo">ZAPIA <span>FINANCE</span></div>
  <button onclick="exportData()" style="background:none; border:none; color:var(--muted)"><span class="material-icons-round">settings</span></button>
</header>

<div class="balance-section">
  <div class="balance-label">Patrimônio Total</div>
  <div class="balance-val" id="totalBalance">R$ 0,00</div>
</div>

<div class="quick-stats">
  <div class="q-box">
    <div class="q-label">Entradas</div>
    <div class="q-val up" id="totalInc">R$ 0,00</div>
  </div>
  <div class="q-box">
    <div class="q-label">Saídas</div>
    <div class="q-val down" id="totalExp">R$ 0,00</div>
  </div>
</div>

<div class="section-title">
  <h3>Transações</h3>
  <span style="font-size: 0.8rem; color: var(--muted); font-weight: 600;" id="itemCount">0 itens</span>
</div>

<div id="list" class="item-list"></div>

<div class="backup-zone" id="emptyState">
  <p style="color: var(--muted); margin-bottom: 16px;">Nenhum dado encontrado.</p>
  <button class="btn-restore" onclick="importData()">RESTAURAR BACKUP</button>
</div>

<button class="fab" onclick="openModal()"><span class="material-icons-round" style="font-size:32px">add</span></button>

<div class="modal" id="modal">
  <div class="sheet">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h2 style="margin:0; font-weight:800;">Novo Registro</h2>
      <button onclick="closeModal()" style="background:none; border:none; color:var(--muted)"><span class="material-icons-round">close</span></button>
    </div>
    
    <div class="input-group">
      <span class="input-label">Valor</span>
      <input type="number" id="fVal" placeholder="0,00" step="0.01">
    </div>
    
    <div class="input-group">
      <span class="input-label">Descrição</span>
      <input type="text" id="fDesc" placeholder="Ex: Supermercado">
    </div>
    
    <div class="input-group">
      <span class="input-label">Categoria</span>
      <select id="fTipo">
        <option value="desp">Despesa (Saída)</option>
        <option value="rec">Receita (Entrada)</option>
      </select>
    </div>
    
    <button class="btn-main" onclick="save()">Confirmar</button>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('zapia_pro_data')) || [];

function save() {
  const v = parseFloat(document.getElementById('fVal').value);
  const d = document.getElementById('fDesc').value;
  const t = document.getElementById('fTipo').value;
  
  if (!v || !d) return alert('Por favor, preencha o valor e a descrição.');
  
  const newItem = {
    id: Date.now(),
    val: v,
    desc: d,
    tipo: t,
    date: new Date().toLocaleDateString('pt-BR')
  };
  
  data.unshift(newItem);
  persist();
  closeModal();
  render();
}

function persist() {
  localStorage.setItem('zapia_pro_data', JSON.stringify(data));
}

function del(id) {
  if(!confirm('Deseja excluir esta transação?')) return;
  data = data.filter(i => i.id !== id);
  persist();
  render();
}

function openModal() { document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function importData() {
  const backup = prompt('Cole aqui o texto do seu backup:');
  if (backup) {
    try {
      const parsed = JSON.parse(backup);
      if (Array.isArray(parsed)) {
        data = parsed;
        persist();
        render();
        alert('Backup restaurado com sucesso! ' + data.length + ' transações recuperadas.');
      } else {
        alert('Formato de backup inválido.');
      }
    } catch(e) {
      alert('Erro ao ler backup. Verifique se copiou o texto completo.');
    }
  }
}

function exportData() {
  const str = JSON.stringify(data);
  console.log(str);
  prompt('Copie seu backup para guardar em lugar seguro:', str);
}

function render() {
  const list = document.getElementById('list');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';
  
  let inc = 0, exp = 0;
  
  if (data.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
  }
  
  data.forEach(i => {
    if (i.tipo === 'rec') inc += i.val; else exp += i.val;
    
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <div class="icon-wrap ${i.tipo}">
        <span class="material-icons-round">${i.tipo==='rec' ? 'trending_up' : 'trending_down'}</span>
      </div>
      <div class="item-body">
        <div class="item-head">${i.desc}</div>
        <div class="item-sub">${i.date}</div>
      </div>
      <div class="item-side">
        <div class="item-amt ${i.tipo==='rec' ? 'rec' : ''}">
          ${i.tipo==='desp' ? '-' : ''} R$ ${i.val.toLocaleString('pt-BR', {minimumFractionDigits:2})}
        </div>
        <div onclick="del(${i.id})" style="font-size:10px; color:var(--muted); margin-top:4px; cursor:pointer;">REMOVER</div>
      </div>
    `;
    list.appendChild(div);
  });
  
  document.getElementById('totalBalance').innerText = 'R$ ' + (inc - exp).toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('totalInc').innerText = 'R$ ' + inc.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('totalExp').innerText = 'R$ ' + exp.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('itemCount').innerText = data.length + ' itens';
}

render();
</script>
</body>
</html>
