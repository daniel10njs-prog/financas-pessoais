<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Finanças Pessoais</title>
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --verde: #22c55e; --vermelho: #ef4444; --amarelo: #f59e0b; --azul: #3b82f6;
  --bg: #0f172a; --card: #1e293b; --card2: #253047; --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; max-width: 480px; margin: 0 auto; padding-bottom: 24px; }
header { padding: 18px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
header h1 { font-size: 1.2rem; font-weight: 700; }
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 5px 8px; font-size: .75rem; cursor: pointer; }
.tab-nav { display: flex; border-bottom: 1px solid var(--border); background: var(--card); }
.tab-nav button { flex: 1; padding: 12px 4px; background: none; border: none; color: var(--muted); font-size: .85rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-nav button.active { color: var(--text); border-bottom-color: var(--azul); }
.cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 14px 12px; }
.card { background: var(--card); border-radius: 12px; padding: 12px 10px; border: 1px solid var(--border); text-align: center; }
.card .label { font-size: .65rem; text-transform: uppercase; color: var(--muted); }
.card .value { font-size: 1rem; font-weight: 700; }
.card.rec .value { color: var(--verde); } .card.desp .value { color: var(--vermelho); } .card.saldo .value { color: var(--azul); }
.real-card { background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--azul); margin: 0 12px 12px; padding: 12px; border-radius: 12px; text-align: center; }
.real-card .label { font-size: .7rem; color: var(--azul); font-weight: 700; }
.real-card .value { font-size: 1.2rem; font-weight: 800; }

.action-buttons { display: flex; gap: 12px; padding: 0 12px 16px; }
.btn-action { flex: 1; padding: 16px; border-radius: 14px; border: none; color: #fff; font-size: 1.2rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
.btn-action.plus { background: var(--verde); }
.btn-action.minus { background: var(--vermelho); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; border: 1px solid var(--border); position: relative; }
.modal h2 { margin-bottom: 20px; font-size: 1.2rem; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
.form-group input, .form-group select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; font-size: 1rem; outline: none; }
.modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
.modal-actions-row { display: flex; gap: 10px; width: 100%; }
.btn-save { flex: 2; padding: 14px; border-radius: 10px; border: none; background: var(--azul); color: #fff; font-weight: 700; cursor: pointer; }
.btn-cancel { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: none; color: var(--muted); font-weight: 600; cursor: pointer; }
.btn-delete { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--vermelho); background: rgba(239, 68, 68, 0.1); color: var(--vermelho); font-weight: 600; cursor: pointer; margin-top: 5px; }

/* LISTA */
.list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
.item { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 0.1s; }
.item:active { transform: scale(0.98); }
.item-info { display: flex; align-items: center; gap: 12px; pointer-events: none; }
.item-icon { font-size: 1.4rem; background: var(--card2); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
.item-text b { font-size: .95rem; }
.item-text div { font-size: .7rem; color: var(--muted); }
.item-val { font-weight: 700; white-space: nowrap; pointer-events: none; }
.item-val.receita { color: var(--verde); } .item-val.despesa { color: var(--vermelho); }
</style>
</head>
<body>
<header>
  <h1>💰 Finanças</h1>
  <div class="header-sync">
    <button class="sync-btn" onclick="exportCSV()">📊 CSV</button>
  </div>
</header>
<div class="tab-nav">
  <button class="active" onclick="setTab('lancamentos')">Lançamentos</button>
  <button onclick="setTab('pendencias')">Pendências</button>
  <button onclick="setTab('graficos')">Análise</button>
</div>

<div id="tab-lancamentos">
  <div class="cards">
    <div class="card rec"><div class="label">Receitas</div><div class="value" id="totalRec">R$ 0</div></div>
    <div class="card desp"><div class="label">Despesas</div><div class="value" id="totalDesp">R$ 0</div></div>
    <div class="card saldo"><div class="label">Saldo</div><div class="value" id="saldo">R$ 0</div></div>
  </div>
  <div class="real-card"><div class="label">Líquido Real</div><div class="value" id="saldoReal">R$ 0,00</div></div>

  <div class="action-buttons">
    <button class="btn-action plus" onclick="openModal('receita')">＋ Receita</button>
    <button class="btn-action minus" onclick="openModal('despesa')">－ Despesa</button>
  </div>

  <div id="search-container" style="padding: 0 12px 12px;">
    <input id="searchInput" type="text" placeholder="🔍 Buscar lançamento..." onkeyup="render()" style="width:100%; background:var(--card2); border:1px solid var(--border); border-radius:10px; color:#fff; padding:10px;">
  </div>

  <div class="list" id="list"></div>
</div>

<div id="tab-pendencias" style="display:none">
  <div class="list" id="listPend" style="margin-top:20px"></div>
</div>

<div id="tab-graficos" style="display:none"><div class="form-box" style="text-align:center; padding:20px;"><canvas id="myChart"></canvas></div></div>

<!-- MODAL DE LANÇAMENTO -->
<div class="modal-overlay" id="modalEntry">
  <div class="modal">
    <h2 id="modalTitle">Novo Lançamento</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Descrição</label>
      <input id="desc" type="text" placeholder="Ex: Salário, Mercado...">
    </div>
    <div class="form-group">
      <label>Valor (R$)</label>
      <input id="val" type="number" step="0.01" placeholder="0,00">
    </div>
    <div class="form-group">
      <label>Tipo / Categoria</label>
      <select id="tipoSub"></select>
    </div>
    <div class="modal-actions">
      <div class="modal-actions-row">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveEntry()">Salvar</button>
      </div>
      <button id="btnDelete" class="btn-delete" style="display:none;" onclick="deleteEntry()">Excluir Lançamento</button>
    </div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('zapia_financas_db')) || { items: [], pendencias: [] };
let chartInstance = null;
let currentMode = 'receita';

const icons = {
  'Salário': '💰', 'Pix Recebido': '💸', 'Ajuste': '⚙️',
  'Alimentação': '🍽️', 'Transporte': '🚗', 'Moradia': '🏠', 'Lazer': '🎡', 'Saúde': '🏥', 'Outros': '📦'
};

const categorias = {
  'receita': ['Salário', 'Pix Recebido', 'Ajuste'],
  'despesa': ['Alimentação', 'Transporte', 'Moradia', 'Lazer', 'Saúde', 'Ajuste', 'Outros']
};

function save() { localStorage.setItem('zapia_financas_db', JSON.stringify(db)); render(); }
function setTab(tab) { ['lancamentos', 'pendencias', 'graficos'].forEach(t => document.getElementById('tab-'+t).style.display = (t===tab?'block':'none')); render(); }

function openModal(mode, id = null) {
  currentMode = mode;
  const select = document.getElementById('tipoSub');
  select.innerHTML = '';
  categorias[mode].forEach(cat => { select.innerHTML += `<option value="${cat}">${cat}</option>`; });

  if (id) {
    const item = db.items.find(x => x.id === id);
    document.getElementById('modalTitle').innerText = 'Editar Lançamento';
    document.getElementById('editId').value = id;
    document.getElementById('desc').value = item.desc;
    document.getElementById('val').value = item.val;
    document.getElementById('tipoSub').value = item.sub;
    document.getElementById('btnDelete').style.display = 'block';
  } else {
    document.getElementById('modalTitle').innerText = mode === 'receita' ? 'Nova Receita' : 'Nova Despesa';
    document.getElementById('editId').value = '';
    document.getElementById('btnDelete').style.display = 'none';
    document.getElementById('desc').value = '';
    document.getElementById('val').value = '';
  }
  document.getElementById('modalEntry').classList.add('show');
}

function closeModal() {
  document.getElementById('modalEntry').classList.remove('show');
}

function saveEntry() {
  const d = document.getElementById('desc').value;
  const v = parseFloat(document.getElementById('val').value);
  const s = document.getElementById('tipoSub').value;
  const id = document.getElementById('editId').value;
  if(!d || !v) return;

  if (id) {
    const idx = db.items.findIndex(x => x.id == id);
    db.items[idx] = { ...db.items[idx], desc: d, val: v, sub: s };
  } else {
    db.items.push({ id: Date.now(), desc: d, val: v, tipo: currentMode, sub: s, data: new Date().toISOString() });
  }
  save(); closeModal();
}

function deleteEntry() {
  const id = document.getElementById('editId').value;
  db.items = db.items.filter(x => x.id != id);
  save(); closeModal();
}

function render() {
    const s = document.getElementById('searchInput').value.toLowerCase();
    const filtered = db.items.filter(i => i.desc.toLowerCase().includes(s));
    let r=0, d=0; filtered.forEach(i => i.tipo==='receita'? r+=i.val : d+=i.val);
    const pTotal = db.pendencias.reduce((a,b)=>a+b.val, 0);
    
    document.getElementById('totalRec').innerText = 'R$ '+r.toLocaleString('pt-BR', {minimumFractionDigits:2});
    document.getElementById('totalDesp').innerText = 'R$ '+d.toLocaleString('pt-BR', {minimumFractionDigits:2});
    document.getElementById('saldo').innerText = 'R$ '+(r-d).toLocaleString('pt-BR', {minimumFractionDigits:2});
    document.getElementById('saldoReal').innerText = 'R$ '+(r-d-pTotal).toLocaleString('pt-BR', {minimumFractionDigits:2});
    
    const l = document.getElementById('list'); l.innerHTML = '';
    filtered.slice().reverse().forEach(i => {
        l.innerHTML += `<div class="item" onclick="openModal('${i.tipo}', ${i.id})">
            <div class="item-info">
                <div class="item-icon">${icons[i.sub] || '📦'}</div>
                <div class="item-text"><b>${i.desc}</b><div>${i.sub}</div></div>
            </div>
            <b class="item-val ${i.tipo}">${i.tipo==='receita'?'+':'-'} R$ ${i.val.toFixed(2)}</b>
        </div>`;
    });
}
window.onload = render;
</script>
</body>
</html>
