<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Zapia Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --verde: #10b981; --verm: #ef4444; --amar: #f59e0b; --azul: #3b82f6; --roxo: #8b5cf6;
  --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --border: rgba(148, 163, 184, 0.1);
  --text: #f8fafc; --muted: #94a3b8; --radius: 16px;
}
* { touch-action: pan-y; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html, body { overflow-x: hidden; width: 100vw; margin: 0; padding: 0; background: #0f172a; color: var(--text); font-family: 'Inter', sans-serif; }
body { background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0, transparent 50%); min-height: 100vh; max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
header { height: 72px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.balance-card { margin: 20px; padding: 24px; background: var(--card); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--border); text-align: center; }
.balance-val { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em; margin: 8px 0; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 20px; }
.stat-box { padding: 16px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
.stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 700; }
.stat-val { font-size: 1.1rem; font-weight: 700; }
.stat-val.up { color: var(--verde); }
.stat-val.down { color: var(--verm); }
.tabs { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
.tab { padding: 8px 16px; background: var(--card); border-radius: 20px; font-size: 0.85rem; white-space: nowrap; border: 1px solid var(--border); color: var(--muted); }
.tab.active { background: var(--azul); color: white; border-color: var(--azul); }
.item { margin: 0 20px 12px; padding: 16px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.item-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(148, 163, 184, 0.1); }
.item-icon.rec { color: var(--verde); background: rgba(16, 185, 129, 0.1); }
.item-icon.desp { color: var(--verm); background: rgba(239, 68, 68, 0.1); }
.item-info { flex: 1; }
.item-title { font-weight: 600; font-size: 0.95rem; }
.item-date { font-size: 0.75rem; color: var(--muted); }
.item-val { font-weight: 700; text-align: right; }
.item-val.rec { color: var(--verde); }
.fab { position: fixed; bottom: 30px; right: 24px; width: 60px; height: 60px; background: var(--azul); border-radius: 30px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4); border: none; z-index: 1000; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.sheet { background: #1e293b; width: 100%; max-width: 400px; border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
input, select { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 16px; font-size: 1rem; }
.btn-save { width: 100%; padding: 16px; background: var(--azul); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; }
</style>
</head>
<body>
<header>
  <h1 style="font-size:1.2rem; font-weight:800; letter-spacing:-0.03em;">ZAPIA <span style="color:var(--azul)">FINANCE</span></h1>
</header>
<div class="balance-card">
  <div class="stat-label">Saldo Disponível</div>
  <div class="balance-val" id="totalBalance">R$ 0,00</div>
</div>
<div class="stats">
  <div class="stat-box">
    <div class="stat-label">Receitas</div>
    <div class="stat-val up" id="totalIncome">R$ 0,00</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Despesas</div>
    <div class="stat-val down" id="totalExpense">R$ 0,00</div>
  </div>
</div>
<div class="tabs" id="filterTabs">
  <div class="tab active" onclick="setFilter('all', this)">Tudo</div>
  <div class="tab" onclick="setFilter('rec', this)">Receitas</div>
  <div class="tab" onclick="setFilter('desp', this)">Despesas</div>
</div>
<div id="list"></div>
<button class="fab" onclick="toggleModal(true)"><span class="material-icons-round" style="font-size:32px">add</span></button>
<div class="modal" id="modal">
  <div class="sheet">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="font-weight:800; letter-spacing:-0.03em;">Novo Lançamento</h2>
      <button onclick="toggleModal(false)" style="background:none; border:none; color:var(--muted)"><span class="material-icons-round">close</span></button>
    </div>
    <input type="number" id="fVal" placeholder="Valor (0,00)" step="0.01">
    <input type="text" id="fDesc" placeholder="Descrição">
    <select id="fTipo">
      <option value="desp">Despesa</option>
      <option value="rec">Receita</option>
      <option value="pend">Pendência</option>
    </select>
    <button class="btn-save" onclick="save()">Salvar</button>
  </div>
</div>
<script>
function load() {
  const keys = ['zapia_fin_v4', 'zapia_fin_v3', 'zapia_fin_v2', 'zapia_fin'];
  for (let k of keys) {
    const d = localStorage.getItem(k);
    if (d) {
      const p = JSON.parse(d);
      if (Array.isArray(p) && p.length > 0) return p;
    }
  }
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    const d = localStorage.getItem(k);
    try {
      const p = JSON.parse(d);
      if (Array.isArray(p) && p.length > 0 && (p[0].desc || p[0].val)) return p;
    } catch(e) {}
  }
  return [];
}
let data = load();
let currentFilter = 'all';
function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }
function save() {
  const v = parseFloat(document.getElementById('fVal').value);
  const d = document.getElementById('fDesc').value;
  const t = document.getElementById('fTipo').value;
  if (!v || !d) return alert('Preencha tudo');
  data.unshift({ id: Date.now(), val: v, desc: d, tipo: t, date: new Date().toLocaleDateString('pt-BR') });
  localStorage.setItem('zapia_fin_v4', JSON.stringify(data));
  toggleModal(false);
  render();
}
function del(id) {
  if(!confirm('Excluir?')) return;
  data = data.filter(i => i.id !== id);
  localStorage.setItem('zapia_fin_v4', JSON.stringify(data));
  render();
}
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function render() {
  const l = document.getElementById('list');
  l.innerHTML = '';
  let inc = 0, exp = 0;
  data.forEach(i => {
    if (i.tipo === 'rec') inc += i.val;
    if (i.tipo === 'desp') exp += i.val;
    if (currentFilter !== 'all' && i.tipo !== currentFilter) return;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="item-icon ${i.tipo}"><span class="material-icons-round">${i.tipo==='rec'?'north_east':(i.tipo==='desp'?'south_west':'schedule')}</span></div>
      <div class="item-info">
        <div class="item-title">${i.desc}</div>
        <div class="item-date">${i.date}</div>
      </div>
      <div class="item-val ${i.tipo==='rec'?'rec':''}">
        ${i.tipo==='desp'?'-':''} R$ ${i.val.toLocaleString('pt-BR', {minimumFractionDigits:2})}
        <div onclick="del(${i.id})" style="color:var(--muted); font-size:10px; cursor:pointer;">Excluir</div>
      </div>
    `;
    l.appendChild(div);
  });
  document.getElementById('totalBalance').innerText = 'R$ ' + (inc - exp).toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('totalIncome').innerText = 'R$ ' + inc.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('totalExpense').innerText = 'R$ ' + exp.toLocaleString('pt-BR', {minimumFractionDigits:2});
}
render();
</script>
</body>
</html>
