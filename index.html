<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance v1.0</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/icon?family=Material+Icons+Round' rel='stylesheet'>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #2563eb; --text: #1e293b; --muted: #64748b; --up: #10b981; --down: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 30px; max-width: 500px; margin: 0 auto; }
        header { padding: 30px 20px; text-align: center; }
        header h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .card-main { margin: 0 20px 20px; padding: 25px; background: var(--primary); color: white; border-radius: 24px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .bal-label { font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .bal-val { font-size: 2.2rem; font-weight: 800; margin-top: 5px; }
        .add-form { margin: 0 20px 25px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .add-form h2 { font-size: 1rem; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; }
        .btn-add { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 1rem; }
        .history { padding: 0 20px; }
        .history h2 { font-size: 1rem; margin-bottom: 15px; color: var(--muted); }
        .item { padding: 15px; background: white; border-radius: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .item-info { flex: 1; }
        .item-title { font-size: 0.95rem; font-weight: 600; }
        .item-val { font-size: 1rem; font-weight: 700; }
        .up { color: var(--up); }
        .down { color: var(--down); }
    </style>
</head>
<body>
<header>
    <h1>Zapia Finance</h1>
    <p style='font-size: 0.8rem; color: var(--muted);'>Sua jornada financeira começa aqui</p>
</header>
<div class='card-main'>
    <div class='bal-label'>Saldo Atual</div>
    <div class='bal-val' id='balance'>R$ 0,00</div>
</div>
<div class='add-form'>
    <h2>Novo Lançamento</h2>
    <input type='text' id='desc' placeholder='Ex: Aluguel, Salário, Mercado...'>
    <input type='number' id='val' placeholder='Valor R$ (ex: 50.00)'>
    <select id='tipo'>
        <option value='despesa'>Gasto (Saída)</option>
        <option value='receita'>Ganho (Entrada)</option>
    </select>
    <button class='btn-add' onclick='salvar()'>Salvar</button>
</div>
<div class='history'>
    <h2>Histórico Recente</h2>
    <div id='lista'></div>
</div>
<script>
    let db = JSON.parse(localStorage.getItem('zapia_fin_v1')) || [];
    function salvar() {
        const desc = document.getElementById('desc').value;
        const val = parseFloat(document.getElementById('val').value);
        const tipo = document.getElementById('tipo').value;
        if(!desc || !val) return alert('Preencha os campos!');
        const registro = { id: Date.now(), desc, val, tipo, data: new Date().toLocaleDateString('pt-BR') };
        db.unshift(registro);
        localStorage.setItem('zapia_fin_v1', JSON.stringify(db));
        document.getElementById('desc').value = '';
        document.getElementById('val').value = '';
        render();
    }
    function render() {
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        let total = 0;
        db.forEach(item => {
            if(item.tipo === 'receita') total += item.val; else total -= item.val;
            lista.innerHTML += `
                <div class='item'>
                    <div class='icon' style='background: ${item.tipo === "receita" ? "#dcfce7" : "#fee2e2"}'>
                        <span class='material-icons-round ${item.tipo === "receita" ? "up" : "down"}'>
                            ${item.tipo === "receita" ? "add_circle" : "remove_circle"}
                        </span>
                    </div>
                    <div class='item-info'>
                        <div class='item-title'>${item.desc}</div>
                        <div style='font-size: 0.7rem; color: var(--muted)'>${item.data}</div>
                    </div>
                    <div class='item-val ${item.tipo === "receita" ? "up" : "down"}'>
                        ${item.tipo === "receita" ? "+" : "-"} R$ ${item.val.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                    </div>
                </div>
            `;
        });
        document.getElementById('balance').innerText = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }
    render();
</script>
</body>
</html>
