<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance v4.0</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/icon?family=Material+Icons+Round' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; max-width: 500px; margin: 0 auto; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: white; }
        .header-left h1 { font-size: 1.2rem; font-weight: 700; }
        .header-left p { font-size: 0.8rem; color: var(--muted); }
        .header-right { display: flex; gap: 8px; }
        .btn-icon { padding: 8px; background: #f1f5f9; border-radius: 12px; border: none; color: var(--muted); }
        .card-editor { margin: 15px; padding: 20px; background: white; border-radius: 24px; border: 2px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 25px; }
        .icon-item { aspect-ratio: 1; background: #f1f5f9; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #333; font-size: 1.2rem; }
        .icon-item.selected { background: var(--primary); color: white; }
        .input-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .row { display: flex; gap: 10px; }
        .input-text { flex: 1; padding: 16px; background: #f8fafc; border: 1px solid var(--border); border-radius: 14px; }
        .select-type { padding: 0 15px; background: #f8fafc; border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--muted); }
        .btn-save { width: 100%; margin-top: 20px; padding: 18px; background: white; border: 2px solid var(--primary); color: #111; font-weight: 700; border-radius: 14px; box-shadow: 0 4px 0 var(--primary); }
        .pills-section { padding: 0 20px; margin-top: 20px; }
        .pills-title { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .pills-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .pill { padding: 10px 15px; background: white; border-radius: 14px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 5px 30px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--muted); text-decoration: none; position: relative; }
        .nav-item i { font-size: 1.4rem; }
        .nav-item span { font-size: 0.6rem; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-badge { position: absolute; top: -5px; right: -5px; background: var(--primary); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; border: 2px solid white; }
    </style>
</head>
<body>
<header>
    <div class='header-left'><h1>Finanças</h1><p>Julho de 2026</p></div>
    <div class='header-right'>
        <button class='btn-icon'><span class='material-icons-round'>chevron_left</span></button>
        <button class='btn-icon'><span class='material-icons-round'>chevron_right</span></button>
        <button class='btn-icon'><span class='material-icons-round'>more_vert</span></button>
    </div>
</header>
<div class='card-editor'>
    <div class='icon-grid'>
        <div class='icon-item'><i class='lucide-briefcase-medical'></i></div>
        <div class='icon-item'><i class='lucide-activity'></i></div>
        <div class='icon-item'><i class='lucide-pill'></i></div>
        <div class='icon-item'><i class='lucide-dumbbell'></i></div>
        <div class='icon-item'><i class='lucide-run'></i></div>
        <div class='icon-item'><i class='lucide-gamepad-2'></i></div>
        <div class='icon-item'><i class='lucide-clapperboard'></i></div>
        <div class='icon-item'><i class='lucide-music'></i></div>
        <div class='icon-item'><i class='lucide-headphones'></i></div>
        <div class='icon-item'><i class='lucide-tv'></i></div>
        <div class='icon-item'><i class='lucide-smartphone'></i></div>
        <div class='icon-item'><i class='lucide-book'></i></div>
        <div class='icon-item'><i class='lucide-graduation-cap'></i></div>
        <div class='icon-item'><i class='lucide-laptop'></i></div>
        <div class='icon-item'><i class='lucide-monitor'></i></div>
        <div class='icon-item'><i class='lucide-keyboard'></i></div>
        <div class='icon-item'><i class='lucide-mouse'></i></div>
        <div class='icon-item'><i class='lucide-wrench'></i></div>
        <div class='icon-item'><i class='lucide-hammer'></i></div>
        <div class='icon-item'><i class='lucide-paint-roller'></i></div>
        <div class='icon-item'><i class='lucide-scissors'></i></div>
        <div class='icon-item'><i class='lucide-camera'></i></div>
        <div class='icon-item'><i class='lucide-mic'></i></div>
        <div class='icon-item'><i class='lucide-zap'></i></div>
        <div class='icon-item'><i class='lucide-flame'></i></div>
        <div class='icon-item'><i class='lucide-droplets'></i></div>
        <div class='icon-item'><i class='lucide-wind'></i></div>
        <div class='icon-item'><i class='lucide-snowflake'></i></div>
        <div class='icon-item'><i class='lucide-sun'></i></div>
        <div class='icon-item'><i class='lucide-moon'></i></div>
        <div class='icon-item'><i class='lucide-star'></i></div>
        <div class='icon-item'><i class='lucide-gem'></i></div>
        <div class='icon-item'><i class='lucide-trophy'></i></div>
        <div class='icon-item'><i class='lucide-medal'></i></div>
        <div class='icon-item selected' style='background: #6b73ff'></div>
        <div class='icon-item'><i class='lucide-rocket'></i></div>
        <div class='icon-item'><i class='lucide-paw-print'></i></div>
        <div class='icon-item'><i class='lucide-leaf'></i></div>
        <div class='icon-item'><i class='lucide-trees'></i></div>
        <div class='icon-item'><i class='lucide-briefcase'></i></div>
        <div class='icon-item'><i class='lucide-key'></i></div>
        <div class='icon-item'><i class='lucide-bell'></i></div>
        <div class='icon-item'><i class='lucide-settings'></i></div>
    </div>
    <div class='input-group'>
        <span class='input-label'>Nome da Categoria</span>
        <div class='row'>
            <input type='text' class='input-text' placeholder='Ex: Viagem'>
            <div class='select-type'><span>Gasto</span><span class='material-icons-round'>expand_more</span></div>
        </div>
    </div>
    <button class='btn-save'>SALVAR CATEGORIA</button>
</div>
<div class='pills-section'>
    <p class='pills-title'>Ganhos</p>
    <div class='pills-container'>
        <div class='pill'><i class='lucide-banknote'></i> Salário <span>×</span></div>
        <div class='pill'><i class='lucide-dollar-sign'></i> Pix Recebido <span>×</span></div>
    </div>
</div>
<nav class='bottom-nav'>
    <a href='#' class='nav-item'><i class='lucide-list-todo'></i><span>Lançar</span></a>
    <a href='#' class='nav-item active'><i class='lucide-clock'></i><span>Contas</span><div class='nav-badge'>11</div></a>
    <a href='#' class='nav-item'><i class='lucide-pie-chart'></i><span>Gráficos</span></a>
    <a href='#' class='nav-item'><i class='lucide-sparkles'></i><span>IA</span></a>
    <a href='#' class='nav-item'><i class='lucide-calendar-days'></i><span>Anual</span></a>
    <a href='#' class='nav-item'><i class='lucide-target'></i><span>Metas</span></a>
    <a href='#' class='nav-item'><i class='lucide-scale'></i><span>Simular</span></a>
</nav>
</body>
</html>
