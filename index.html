<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Finanças Pessoais</title>
<meta name="theme-color" content="#0f172a">







<script>
function salvarNaNuvem() {
    var key = document.getElementById('SINC_INPUT').value;
    if(!key || key.length < 3) {
        alert('Digite uma chave!');
        return;
    }
    
    var btn = document.getElementById('SINC_BTN_ACAO');
    btn.innerHTML = 'Salvando...';
    
    // Pegar o banco de dados exato da v98
    var dados = localStorage.getItem('zapia_financas_db');
    
    // Salvar na nuvem via npoint (extremamente simples e rápido)
    fetch('https://api.npoint.io/46e507f35476d05f3214', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chave: key, dados: dados})
    })
    .then(function() {
        alert('✅ SUCESSO! Dados salvos na nuvem.');
        alert('Agora use a chave ' + key + ' no outro celular.');
        document.getElementById('MODAL_SINC_REAL').style.display = 'none';
        btn.innerHTML = 'Sincronizar Agora';
    })
    .catch(function() {
        alert('Erro ao salvar. Verifique a internet.');
        btn.innerHTML = 'Sincronizar Agora';
    });
}
</script>

</body>
</html>
