<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Zapia Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --primary: #6366f1;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius-lg: 24px;
  --radius-md: 16px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Plus Jakarta Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-y;
}

body {
  background-color: var(--bg);
  color: var(--text-main);
  max-width: 500px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 100px;
  overflow-x: hidden;
}

/* Header Estilo Apple Health */
header {
  padding: 40px 24px 20px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}
header h1 {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--text-main);
}
header .date {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Card de Saldo Elegante */
.main-card {
  margin: 0 24px 32px;
  padding: 32px;
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}
.main-card .label {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: block;
}
.main-card .value {
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.05em;
  margin-bottom: 24px;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.stat-box {
  padding: 12px;
}
.stat-box .lab { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 4px; }
.stat-box .val { font-size: 1.1rem; font-weight: 700; }
.stat-box.up .val { color: var(--success); }
.stat-box.down .val { color: var(--danger); }

/* Tabs Minimalistas */
.tabs {
  display: flex;
  margin: 0 24px 24px;
  gap: 24px;
  border-bottom: 2px solid var(--border);
}
.tab-btn {
  padding: 12px 0;
  background: none;
  border: none;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-muted);
  position: relative;
  transition: 0.2s;
}
.tab-btn.active {
  color: var(--primary);
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--primary);
}

/* Lista de Itens Clean */
.list-container {
  padding: 0 24px;
}
.item {
  background: var(--surface);
  padding: 16px;
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  border: 1px solid var(--border);
  transition: transform 0.1s;
}
.item:active { transform: scale(0.98); }

.item-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
}
.item-icon.rec { background: #dcfce7; color: var(--success); }
.item-icon.desp { background: #fee2e2; color: var(--danger); }
.item-icon.pend { background: #fef3c7; color: var(--warning); }

.item-info { flex: 1; }
.item-title { font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
.item-subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

.item-value { text-align: right; }
.item-amount { font-weight: 800; font-size: 1.1rem; }
.item-amount.rec { color: var(--success); }

/* Navegação Inferior Estilo Floating */
.bottom-nav {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 48px);
  max-width: 452px;
  background: var(--text-main);
  border-radius: 32px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 16px;
  box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
  z-index: 200;
}
.nav-btn {
  background: none;
  border: none;
  color: #94a3b8;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.nav-btn.active { color: #ffffff; }
.nav-btn .material-icons-round { font-size: 1.6rem; }
.nav-btn span { font-size: 0.65rem; font-weight: 600; }

.fab {
  width: 56px;
  height: 56px;
  background: var(--primary);
  border-radius: 20px;
  border: none;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -40px;
  box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
}

/* Modais e Forms */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 300;
  display: none;
  align-items: flex-end;
}
.overlay.show { display: flex; }
.sheet {
  background: var(--surface);
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  border-radius: 32px 32px 0 0;
  padding: 32px 24px;
  max-height: 90vh;
  overflow-y: auto;
}
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); }
.form-control {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: 2px solid var(--border);
  background: var(--bg);
  font-size: 1rem;
  font-weight: 600;
  outline: none;
}
.form-control:focus { border-color: var(--primary); }
.btn-submit {
  width: 100%;
  padding: 18px;
  border-radius: 18px;
  border: none;
  background: var(--text-main);
  color: white;
  font-size: 1rem;
  font-weight: 800;
  margin-top: 10px;
}

</style>
</head>
<body>

<header>
  <div class="date" id="currentDate">Terça, 14 de Julho</div>
  <h1>Resumo</h1>
</header>

<div class="main-card">
  <span class="label">Saldo Disponível</span>
  <div class="value" id="totalBalance">R$ 0,00</div>
  <div class="stats-grid">
    <div class="stat-box up">
      <span class="lab">Receitas</span>
      <div class="val" id="totalIncome">R$ 0,00</div>
    </div>
    <div class="stat-box down">
      <span class="lab">Despesas</span>
      <div class="val" id="totalExpense">R$ 0,00</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('all')">Todos</button>
  <button class="tab-btn" onclick="switchTab('rec')">Receitas</button>
  <button class="tab-btn" onclick="switchTab('desp')">Despesas</button>
</div>

<div class="list-container" id="transactionList">
  <!-- Itens injetados via JS -->
</div>

<nav class="bottom-nav">
  <button class="nav-btn active">
    <span class="material-icons-round">dashboard</span>
    <span>Início</span>
  </button>
  <button class="fab" onclick="openModal()">
    <span class="material-icons-round">add</span>
  </button>
  <button class="nav-btn">
    <span class="material-icons-round">account_balance_wallet</span>
    <span>Contas</span>
  </button>
</nav>

<!-- Modal Add -->
<div class="overlay" id="modalOverlay">
  <div class="sheet">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h2 style="font-weight:800; letter-spacing:-0.03em;">Novo Lançamento</h2>
      <button onclick="closeModal()" style="background:none; border:none;"><span class="material-icons-round">close</span></button>
    </div>
    
    <div class="form-group">
      <label>VALOR</label>
      <input type="number" class="form-control" id="fVal" placeholder="0,00" step="0.01">
    </div>
    <div class="form-group">
      <label>DESCRIÇÃO</label>
      <input type="text" class="form-control" id="fDesc" placeholder="Ex: Aluguel">
    </div>
    <div class="form-group">
      <label>TIPO</label>
      <select class="form-control" id="fTipo">
        <option value="desp">Despesa</option>
        <option value="rec">Receita</option>
        <option value="pend">Pendência</option>
      </select>
    </div>
    <button class="btn-submit" onclick="saveTransaction()">Salvar Lançamento</button>
  </div>
</div>

<script>
// Scanner de Emergência de Nível 3
function loadData() {
  console.log("Scanner Nível 3 Iniciado...");
  
  // Tenta as chaves conhecidas primeiro em ordem de probabilidade
  const knownKeys = ['zapia_fin_v4', 'zapia_fin_v4.2', 'zapia_fin_v4.0', 'zapia_fin_v3', 'zapia_fin_v2', 'zapia_fin', 'financas_pessoais'];
  
  for (let key of knownKeys) {
    const d = localStorage.getItem(key);
    if (d) {
      try {
        const p = JSON.parse(d);
        if (Array.isArray(p) && p.length > 0) {
          console.log("Achou em chave conhecida:", key);
          localStorage.setItem('zapia_fin_v4', d);
          return p;
        }
      } catch(e) {}
    }
  }

  // Se não achou, varre TUDO mesmo
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    const d = localStorage.getItem(k);
    try {
      const p = JSON.parse(d);
      if (Array.isArray(p) && p.length > 0) {
        // Verifica se o primeiro item tem cara de transação
        if (p[0].desc || p[0].val || p[0].tipo) {
           console.log("Achou por estrutura na chave:", k);
           localStorage.setItem('zapia_fin_v4', d);
           return p;
        }
      }
    } catch(e) {}
  }
  
  return [];
}

let transactions = loadData();

function switchTab(type) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render(type);
}

function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function saveTransaction() {
  const val = parseFloat(document.getElementById('fVal').value);
  const desc = document.getElementById('fDesc').value;
  const tipo = document.getElementById('fTipo').value;

  if(!val || !desc) return alert('Preencha os campos');

  transactions.unshift({
    id: Date.now(),
    val,
    desc,
    tipo,
    date: new Date().toLocaleDateString('pt-BR')
  });

  localStorage.setItem('zapia_fin_v4', JSON.stringify(transactions));
  closeModal();
  render();
}

function deleteItem(id) {
  transactions = transactions.filter(t => t.id !== id);
  localStorage.setItem('zapia_fin_v4', JSON.stringify(transactions));
  render();
}

function render(filter = 'all') {
  const list = document.getElementById('transactionList');
  list.innerHTML = '';
  
  let income = 0, expense = 0;

  transactions.forEach(t => {
    if(t.tipo === 'rec') income += t.val;
    if(t.tipo === 'desp') expense += t.val;

    if(filter !== 'all' && t.tipo !== filter) return;

    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="item-icon ${t.tipo}">
        <span class="material-icons-round">${t.tipo === 'rec' ? 'north_east' : (t.tipo === 'desp' ? 'south_west' : 'schedule')}</span>
      </div>
      <div class="item-info">
        <div class="item-title">${t.desc}</div>
        <div class="item-subtitle">${t.date}</div>
      </div>
      <div class="item-value">
        <div class="item-amount ${t.tipo === 'rec' ? 'rec' : ''}">
          ${t.tipo === 'desp' ? '-' : ''} R$ ${t.val.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
        </div>
        <button onclick="deleteItem(${t.id})" style="background:none; border:none; color: #cbd5e1; margin-top:4px;">
          <span class="material-icons-round" style="font-size:1.1rem;">delete_outline</span>
        </button>
      </div>
    `;
    list.appendChild(div);
  });

  document.getElementById('totalBalance').innerText = `R$ ${(income - expense).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('totalIncome').innerText = `R$ ${income.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
  document.getElementById('totalExpense').innerText = `R$ ${expense.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
}

// Init
render();
</script>

</body>
</html>
