<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Finanças Premium v22</title>
    <link href='https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #000000; 
            --card-dark: #121214;
            --card-header: #1a1a1e;
            --text-primary: #ffffff;
            --text-muted: #88888b;
            --up: #4ade80;
            --down: #f87171;
            --primary: #ffffff;
            --accent-red: #ff3b30;
            --border: rgba(255, 255, 255, 0.08);
            --nav-bg: #0a0a0c;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary); 
            font-family: 'Outfit', sans-serif;
            padding-bottom: 120px;
            min-height: 100vh;
        }

        /* HEADER & MONTH PICKER */
        header { 
            padding: 24px 20px; 
            display: flex; justify-content: space-between; align-items: flex-start; 
        }
        .title-area h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
        .title-area p { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        
        .header-controls { display: flex; gap: 8px; }
        .control-btn { 
            background: var(--card-header); border: 1px solid var(--border); 
            color: #fff; width: 42px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer;
        }

        /* RESUMO CARD (Estilo Imagem) */
        .summary-card {
            background: var(--card-dark);
            margin: 0 20px 32px;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }
        .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .summary-row span { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .summary-row b { font-family: 'JetBrains Mono', monospace; font-size: 1rem; }
        .summary-divider { border-top: 1px dotted var(--border); margin: 16px 0; }
        .summary-total { display: flex; justify-content: space-between; align-items: center; }
        .summary-total span { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .summary-total b { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; color: var(--up); }

        /* LISTA DE PENDÊNCIAS (DESIGN SOLICITADO) */
        .view-section { padding: 0 20px; }
        .section-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 1.1rem; font-weight: 700; }
        .section-subtitle { font-size: 0.7rem; color: var(--text-muted); font-style: italic; }

        .pending-card {
            background: var(--card-dark);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        /* Detalhe Vermelho na Lateral Esquerda */
        .pending-card::before {
            content: ''; position: absolute; left: 0; top: 15%; height: 70%; width: 4px; 
            background: var(--accent-red); border-radius: 0 4px 4px 0;
        }

        .pending-left { display: flex; align-items: center; gap: 16px; }
        .custom-checkbox {
            width: 24px; height: 24px; border-radius: 6px;
            background: #2563eb; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 12px; cursor: pointer;
        }
        
        .pending-info .p-name { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 4px; display: block; }
        .pending-info .p-meta { font-size: 0.75rem; color: var(--text-muted); }
        .pending-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--down); }

        /* NAVEGAÇÃO (DESIGN IMAGEM) */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px;
            background: var(--nav-bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 10px; z-index: 2000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: #2563eb; }
        .nav-item i { font-size: 1.4rem; }
        .nav-item span { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; }

        /* MODAIS E FORMS */
        #menuOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2500; display: none; }
        #mainMenu { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1e; 
            border-radius: 24px 24px 0 0; padding: 24px; z-index: 3000; display: none; 
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .menu-option { padding: 16px; font-weight: 600; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .floating-add { 
            position: fixed; bottom: 105px; right: 20px; width: 56px; height: 56px; 
            background: #2563eb; border-radius: 18px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4); z-index: 1000;
        }
    </style>
</head>
<body>

<div id='menuOverlay' onclick='toggleMenu()'></div>

<header>
    <div class='title-area'>
        <h1>Finanças</h1>
        <p id='displayDate'>Julho de 2026</p>
    </div>
    <div class='header-controls'>
        <div class='control-btn'><i class='lucide-chevron-left'></i></div>
        <div class='control-btn'><i class='lucide-chevron-right'></i></div>
        <div class='control-btn' onclick='toggleMenu()'><i class='lucide-more-vertical'></i></div>
    </div>
</header>

<!-- RESUMO PRINCIPAL -->
<div class='summary-card'>
    <div class='summary-row'>
        <span>Total Entradas:</span>
        <b id='resRec' style='color:var(--up)'>R$ 0,00</b>
    </div>
    <div class='summary-row'>
        <span>Total Pendências:</span>
        <b id='resPend' style='color:var(--down)'>R$ 0,00</b>
    </div>
    <div class='summary-divider'></div>
    <div class='summary-total'>
        <span>Saldo Livre:</span>
        <b id='resSaldo'>R$ 0,00</b>
    </div>
</div>

<!-- CONTEÚDO PRINCIPAL (PENDÊNCIAS) -->
<div id='view-lancar' class='tab-content active'>
    <div class='view-section'>
        <div class='section-header-row'>
            <h2 class='section-title'>Suas Pendências</h2>
            <span class='section-subtitle'>Desmarque o que não pretende pagar agora</span>
        </div>
        <div id='pendingList'>
            <!-- Cards gerados dinamicamente -->
        </div>
    </div>
</div>

<!-- OUTRAS ABAS (SKELETON) -->
<div id='view-graficos' class='tab-content'><div class='view-section'><h2>Gráficos</h2></div></div>
<div id='view-ia' class='tab-content'><div class='view-section'><h2>Zapia IA</h2></div></div>
<div id='view-metas' class='tab-content'><div class='view-section'><h2>Metas</h2></div></div>

<!-- MENU INFERIOR (ESTILO IMAGEM) -->
<nav class='nav-bar'>
    <div class='nav-item active' onclick='switchTab("lancar")'><i class='lucide-banknote'></i><span>Lançar</span></div>
    <div class='nav-item' onclick='switchTab("contas")'><i class='lucide-hourglass'></i><span>Contas</span></div>
    <div class='nav-item' onclick='switchTab("graficos")'><i class='lucide-bar-chart-2'></i><span>Gráficos</span></div>
    <div class='nav-item' onclick='switchTab("ia")'><i class='lucide-sparkles'></i><span>IA</span></div>
    <div class='nav-item' onclick='switchTab("metas")'><i class='lucide-target'></i><span>Metas</span></div>
</nav>

<div class='floating-add' onclick='openAddForm()'>+</div>

<div id='mainMenu'>
    <div class='menu-option' onclick='exportToClipboard()'><i class='lucide-copy'></i> Copiar Backup</div>
    <div class='menu-option' onclick='importFromClipboard()'><i class='lucide-upload'></i> Importar Backup</div>
    <div class='menu-option' onclick='resetAll()' style='color:var(--down)'><i class='lucide-trash-2'></i> Resetar Sistema</div>
</div>

<script>
    // Inicialização do Banco de Dados
    let db = JSON.parse(localStorage.getItem('financas_premium_v22')) || {
        items: [
            { id: 1, desc: 'Moto - 1/48', val: 888.17, tipo: 'pend', cat: 'bike Moto', date: '2026-07-20' },
            { id: 2, desc: 'Aluguel', val: 250.00, tipo: 'pend', cat: 'home Moradia', date: '2026-07-20' },
            { id: 3, desc: 'Salgados - Bebeba', val: 54.00, tipo: 'pend', cat: 'utensils-crossed Alimentação', date: '2026-07-20' },
            { id: 4, desc: 'Lanches - Guiguia', val: 40.00, tipo: 'pend', cat: 'utensils-crossed Alimentação', date: '2026-07-20' },
            { id: 5, desc: 'Internet', val: 60.00, tipo: 'pend', cat: 'home Moradia', date: '2026-07-20' }
        ]
    };

    function toggleMenu() {
        const m = document.getElementById('mainMenu'), o = document.getElementById('menuOverlay');
        const show = m.style.display !== 'block';
        m.style.display = show ? 'block' : 'none';
        o.style.display = show ? 'block' : 'none';
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const target = document.getElementById('view-' + t);
        if(target) target.classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function openAddForm() {
        const desc = prompt("Descrição:");
        const valor = parseFloat(prompt("Valor:"));
        const tipo = prompt("Tipo (rec/desp/pend):");
        if(desc && !isNaN(valor)) {
            db.items.unshift({ id: Date.now(), desc, val: valor, tipo: tipo || 'pend', cat: 'Geral', date: new Date().toISOString() });
            save();
        }
    }

    function save() { localStorage.setItem('financas_premium_v22', JSON.stringify(db)); render(); }

    function render() {
        let rec = 0, pnd = 0, desp = 0;
        const pList = document.getElementById('pendingList');
        pList.innerHTML = '';

        db.items.forEach(i => {
            if(i.tipo === 'rec') rec += i.val;
            else if(i.tipo === 'desp') desp += i.val;
            else if(i.tipo === 'pend') {
                pnd += i.val;
                // Renderizar card estilo imagem
                const html = `
                    <div class='pending-card'>
                        <div class='pending-left'>
                            <div class='custom-checkbox'><i class='lucide-check'></i></div>
                            <div class='pending-info'>
                                <span class='p-name'>${i.desc}</span>
                                <span class='p-meta'>Venc: ${new Date(i.date).toLocaleDateString('pt-BR')} | ${i.cat}</span>
                            </div>
                        </div>
                        <div class='pending-value'>R$ ${i.val.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                    </div>
                `;
                pList.innerHTML += html;
            }
        });

        document.getElementById('resRec').innerText = 'R$ ' + rec.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('resPend').innerText = 'R$ ' + pnd.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('resSaldo').innerText = 'R$ ' + (rec - pnd - desp).toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    function exportToClipboard() { navigator.clipboard.writeText(JSON.stringify(db)); alert('Copiado!'); toggleMenu(); }
    function importFromClipboard() { 
        const d = prompt('Cole os dados:'); 
        if(d) { db = JSON.parse(d); save(); } 
        toggleMenu(); 
    }
    function resetAll() { if(confirm('Resetar?')) { db = {items:[]}; save(); } toggleMenu(); }

    render();
</script>
</body>
</html>
