<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance Pro</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/icon?family=Material+Icons+Round' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --primary: #3b82f6; --text: #f8fafc;
            --muted: #94a3b8; --up: #10b981; --down: #ef4444; --warn: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; max-width: 500px; margin: 0 auto; overflow-x: hidden; }
        
        header { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .h-info h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; }
        .h-info p { font-size: 0.8rem; color: var(--muted); }
        .h-btns { display: flex; gap: 8px; }
        .h-btn { background: #1e293b; border: none; color: var(--muted); padding: 10px; border-radius: 12px; display: flex; align-items: center; }

        .total-card { margin: 0 20px 30px; padding: 30px; background: #161b2c; border-radius: 28px; border: 2px solid var(--warn); position: relative; }
        .total-card::before { content: 'ZAPIA FINANCE PRO'; position: absolute; top: 15px; right: 20px; font-size: 0.5rem; color: var(--muted); letter-spacing: 1px; }
        .tc-label { font-size: 0.65rem; font-weight: 800; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .tc-val { font-size: 2.8rem; font-weight: 800; color: var(--warn); margin-bottom: 15px; letter-spacing: -1px; }
        .tc-count { font-size: 0.7rem; color: #38bdf8; text-transform: uppercase; font-weight: 700; }

        .section-title { margin: 0 20px 15px; font-size: 1rem; font-weight: 600; color: var(--text); }

        .list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .item { background: #161b2c; padding: 20px; border-radius: 24px; display: flex; align-items: center; gap: 15px; }
        .item-icon { width: 55px; height: 55px; background: #1e293b; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--warn); font-size: 1.4rem; flex-shrink: 0; }
        .item-content { flex: 1; }
        .item-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
        .item-meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
        .item-note { font-size: 0.75rem; color: var(--warn); font-style: italic; }
        .item-side { text-align: right; }
        .item-price { font-size: 1rem; font-weight: 700; color: var(--warn); margin-bottom: 10px; }
        .item-actions { display: flex; gap: 6px; align-items: center; }
        .btn-pay { background: #00ff88; color: #000; border: none; padding: 10px 18px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .btn-sm { background: #1e293b; border: none; color: #38bdf8; padding: 10px; border-radius: 12px; display: flex; align-items: center; }
        .btn-sm.red { color: var(--down); }

        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #0b0f1a; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 15px 5px 35px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; position: relative; }
        .nav-item i { font-size: 1.5rem; }
        .nav-item span { font-size: 0.6rem; font-weight: 600; }
        .nav-item.active { color: #38bdf8; }
        .nav-badge { position: absolute; top: -5px; right: -5px; background: var(--down); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; border: 2px solid var(--bg); font-weight: 800; }
    </style>
</head>
<body>

<header>
    <div class='h-info'>
        <h1>Finanças</h1>
        <p>Julho de 2026</p>
    </div>
    <div class='h-btns'>
        <button class='h-btn'><span class='material-icons-round'>chevron_left</span></button>
        <button class='h-btn'><span class='material-icons-round'>chevron_right</span></button>
        <button class='h-btn'><span class='material-icons-round'>more_vert</span></button>
    </div>
</header>

<div class='total-card'>
    <span class='tc-label'>Total a Pagar</span>
    <div class='tc-val'>R$ 3.967,19</div>
    <span class='tc-count'>11 Contas Pendentes</span>
</div>

<h2 class='section-title'>Contas a Pagar</h2>

<div class='list'>
    <div class='item'>
        <div class='item-icon'><i class='lucide-bike'></i></div>
        <div class='item-content'>
            <div class='item-title'>Moto - 1/48</div>
            <div class='item-meta'>Moto • 20/07</div>
            <div class='item-note'>Parcela 1/48</div>
        </div>
        <div class='item-side'>
            <div class='item-price'>R$ 888,17</div>
            <div class='item-actions'>
                <button class='btn-pay'><span class='material-icons-round' style='font-size:14px'>check</span> PAGAR</button>
                <button class='btn-sm'><i class='lucide-pen-line' style='font-size:14px'></i></button>
                <button class='btn-sm red'><span class='material-icons-round' style='font-size:14px'>close</span></button>
            </div>
        </div>
    </div>

    <div class='item'>
        <div class='item-icon'><i class='lucide-home'></i></div>
        <div class='item-content'>
            <div class='item-title'>Aluguel</div>
            <div class='item-meta'>Moradia • 20/07</div>
            <div class='item-note'>Mês Julho</div>
        </div>
        <div class='item-side'>
            <div class='item-price'>R$ 250,00</div>
            <div class='item-actions'>
                <button class='btn-pay'><span class='material-icons-round' style='font-size:14px'>check</span> PAGAR</button>
                <button class='btn-sm'><i class='lucide-pen-line' style='font-size:14px'></i></button>
                <button class='btn-sm red'><span class='material-icons-round' style='font-size:14px'>close</span></button>
            </div>
        </div>
    </div>

    <div class='item'>
        <div class='item-icon'><i class='lucide-utensils'></i></div>
        <div class='item-content'>
            <div class='item-title'>Salgados - Bebeba</div>
            <div class='item-meta'>Alimentação • 20/07</div>
        </div>
        <div class='item-side'>
            <div class='item-price'>R$ 54,00</div>
            <div class='item-actions'>
                <button class='btn-pay'><span class='material-icons-round' style='font-size:14px'>check</span> PAGAR</button>
                <button class='btn-sm'><i class='lucide-pen-line' style='font-size:14px'></i></button>
                <button class='btn-sm red'><span class='material-icons-round' style='font-size:14px'>close</span></button>
            </div>
        </div>
    </div>
</div>

<nav class='bottom-nav'>
    <a href='#' class='nav-item'><i class='lucide-layout-grid'></i><span>Lançar</span></a>
    <a href='#' class='nav-item active'><i class='lucide-clock'></i><span>Contas</span></a>
    <a href='#' class='nav-item'><i class='lucide-pie-chart'></i><span>Gráficos</span></a>
    <a href='#' class='nav-item'><i class='lucide-sparkles'></i><span>IA</span></a>
    <a href='#' class='nav-item'><i class='lucide-calendar-days'></i><span>Anual</span></a>
    <a href='#' class='nav-item'><i class='lucide-target'></i><span>Metas</span></a>
    <a href='#' class='nav-item'><i class='lucide-scale'></i><span>Simular</span><div class='nav-badge'>11</div></a>
</nav>

</body>
</html>
