<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance Elite v10</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #050810; --card: #0f1424; --primary: #3b82f6; --text: #f8fafc;
            --muted: #64748b; --up: #10b981; --down: #f43f5e; --warn: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; max-width: 500px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 40px 20px 25px; }
        header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to right, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        .tab-content { display: none; padding: 0 20px; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard */
        .dash-main { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 32px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .dash-row { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .dash-item { flex: 1; }
        .dash-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; display: block; margin-bottom: 8px; }
        .dash-val { font-size: 1.2rem; font-weight: 800; }
        .dash-total { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .dash-total .dash-val { font-size: 2.2rem; color: var(--text); letter-spacing: -1px; }

        /* Form */
        .form-box { background: var(--card); padding: 20px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 20px; }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.1rem; }
        input { width: 100%; padding: 16px 16px 16px 45px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; color: white; font-size: 0.95rem; outline: none; }
        .btn-main { width: 100%; padding: 18px; background: #3b82f6; border: none; border-radius: 18px; color: white; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-main.warn { background: var(--warn); color: black; }
        .btn-main:active { transform: scale(0.97); }

        /* List */
        .section-title { font-size: 0.85rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 15px; }
        .item-card { background: var(--card); padding: 18px; border-radius: 24px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .item-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.03); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .item-info { flex: 1; }
        .item-title { font-size: 0.95rem; font-weight: 700; }
        .item-val { text-align: right; font-weight: 800; font-size: 1rem; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 460px; background: rgba(15, 20, 36, 0.9); backdrop-filter: blur(20px); border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; padding: 10px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--muted); text-decoration: none; cursor: pointer; padding: 12px 8px; border-radius: 20px; flex: 1; }
        .nav-item.active { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .nav-item i { font-size: 1.3rem; }
        .nav-item span { font-size: 0.5rem; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1 id='viewTitle'>Lançar</h1>
    <p id='headerDate'>Finanças Elite</p>
</header>

<!-- VIEW: LANÇAR (Somente Receita/Despesa) -->
<div id='view-lancar' class='tab-content active'>
    <div class='dash-main'>
        <div class='dash-row'>
            <div class='dash-item'>
                <span class='dash-label'>Receitas</span>
                <div class='dash-val' style='color: var(--up)' id='dashRec'>R$ 0,00</div>
            </div>
            <div class='dash-item' style='text-align: right'>
                <span class='dash-label'>Despesas</span>
                <div class='dash-val' style='color: var(--down)' id='dashDesp'>R$ 0,00</div>
            </div>
        </div>
        <div class='dash-total'>
            <span class='dash-label'>Saldo em Conta</span>
            <div class='dash-val' id='dashSaldo'>R$ 0,00</div>
        </div>
    </div>

    <div class='form-box'>
        <div class='input-group'><i class='lucide-text-cursor-input'></i><input type='text' id='fDesc' placeholder='Descrição do gasto/ganho'></div>
        <div class='input-group'><i class='lucide-dollar-sign'></i><input type='number' id='fVal' placeholder='Valor R$'></div>
        <div style='display:flex; gap:10px'>
            <button class='btn-main' style='background: var(--up); color: black' onclick='add("rec")'>+ RECEITA</button>
            <button class='btn-main' style='background: var(--down)' onclick='add("desp")'>- DESPESA</button>
        </div>
    </div>

    <h2 class='section-title'>Últimas Movimentações</h2>
    <div id='recentList'></div>
</div>

<!-- VIEW: CONTAS (Lançar Pendências + Lista) -->
<div id='view-contas' class='tab-content'>
    <div class='dash-main' style='border-color: var(--warn)'>
        <span class='dash-label' style='color:var(--warn)'>Total Pendente</span>
        <div class='dash-val' style='font-size: 2.2rem; color: var(--warn)' id='pTotal'>R$ 0,00</div>
    </div>

    <div class='form-box' style='border-color: var(--warn)'>
        <div class='input-group'><i class='lucide-calendar-clock'></i><input type='text' id='pDesc' placeholder='Qual conta vai pagar depois?'></div>
        <div class='input-group'><i class='lucide-dollar-sign'></i><input type='number' id='pVal' placeholder='Valor R$'></div>
        <button class='btn-main warn' onclick='addPend()'>AGENDAR PENDÊNCIA</button>
    </div>

    <h2 class='section-title'>Contas Pendentes</h2>
    <div id='pList'></div>
</div>

<nav class='bottom-nav'>
    <div class='nav-item active' onclick='switchTab("lancar")'><i class='lucide-plus-circle'></i><span>Lançar</span></div>
    <div class='nav-item' onclick='switchTab("contas")'><i class='lucide-clock'></i><span>Pendências</span></div>
    <div class='nav-item'><i class='lucide-bar-chart-3'></i><span>Anual</span></div>
    <div class='nav-item'><i class='lucide-target'></i><span>Metas</span></div>
    <div class='nav-item'><i class='lucide-scale'></i><span>Simular</span></div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('zapia_v10')) || { items: [] };

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + t).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('viewTitle').innerText = t === 'lancar' ? 'Lançar' : 'Pendências';
        render();
    }

    function add(tipo) {
        const d = document.getElementById('fDesc').value, v = parseFloat(document.getElementById('fVal').value);
        if(!d || isNaN(v)) return;
        db.items.unshift({ id: Date.now(), desc: d, val: v, tipo: tipo, date: '14/07' });
        document.getElementById('fDesc').value = ''; document.getElementById('fVal').value = '';
        persist();
    }

    function addPend() {
        const d = document.getElementById('pDesc').value, v = parseFloat(document.getElementById('pVal').value);
        if(!d || isNaN(v)) return;
        db.items.unshift({ id: Date.now(), desc: d, val: v, tipo: 'pend', date: '14/07' });
        document.getElementById('pDesc').value = ''; document.getElementById('pVal').value = '';
        persist();
    }

    function persist() { localStorage.setItem('zapia_v10', JSON.stringify(db)); render(); }

    function render() {
        let rec = 0, desp = 0, pnd = 0;
        const rList = document.getElementById('recentList'); rList.innerHTML = '';
        const pList = document.getElementById('pList'); pList.innerHTML = '';

        db.items.forEach(i => {
            if(i.tipo === 'rec') rec += i.val;
            else if(i.tipo === 'desp') desp += i.val;
            else if(i.tipo === 'pend') pnd += i.val;

            const color = i.tipo === 'rec' ? 'var(--up)' : (i.tipo === 'pend' ? 'var(--warn)' : 'var(--down)');
            const icon = i.tipo === 'rec' ? 'lucide-trending-up' : (i.tipo === 'pend' ? 'lucide-clock' : 'lucide-trending-down');
            
            const html = `<div class='item-card'>
                <div class='item-icon' style='color:${color}'><i class='${icon}'></i></div>
                <div class='item-info'><div class='item-title'>${i.desc}</div><div style='font-size:0.7rem;color:var(--muted)'>${i.date}</div></div>
                <div class='item-val' style='color:${color}'>R$ ${i.val.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
            </div>`;

            if(i.tipo === 'pend') pList.innerHTML += html;
            else rList.innerHTML += html;
        });

        document.getElementById('dashRec').innerText = 'R$ ' + rec.toLocaleString('pt-BR');
        document.getElementById('dashDesp').innerText = 'R$ ' + desp.toLocaleString('pt-BR');
        document.getElementById('dashSaldo').innerText = 'R$ ' + (rec - desp).toLocaleString('pt-BR');
        document.getElementById('pTotal').innerText = 'R$ ' + pnd.toLocaleString('pt-BR');
    }
    render();
</script>
</body>
</html>
