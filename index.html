<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance Pro - v6.0</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/icon?family=Material+Icons+Round' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --primary: #3b82f6; --text: #f8fafc;
            --muted: #94a3b8; --up: #10b981; --down: #ef4444; --warn: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; max-width: 500px; margin: 0 auto; overflow-x: hidden; }
        
        header { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .h-info h1 { font-size: 1.4rem; font-weight: 700; }
        .h-info p { font-size: 0.8rem; color: var(--muted); }
        
        .summary-scroll { display: flex; gap: 15px; padding: 0 20px 25px; overflow-x: auto; scrollbar-width: none; }
        .s-card { min-width: 200px; padding: 25px; border-radius: 28px; border: 2px solid transparent; flex-shrink: 0; }
        .s-blue { background: #161b2c; border-color: var(--primary); }
        .s-yellow { background: #161b2c; border-color: var(--warn); }
        .s-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 10px; }
        .s-val { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }

        .form-card { margin: 0 20px 25px; padding: 20px; background: #161b2c; border-radius: 24px; border: 1px solid #1e293b; }
        input, select { width: 100%; padding: 14px; background: #0b0f1a; border: 1px solid #1e293b; border-radius: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn-add { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; transition: 0.2s; }
        .btn-add:active { transform: scale(0.98); }

        .section-title { margin: 0 20px 15px; font-size: 0.9rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

        .list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .item { background: #161b2c; padding: 18px; border-radius: 24px; display: flex; align-items: center; gap: 15px; border: 1px solid #1e293b; }
        .item-icon { width: 48px; height: 48px; background: #1e293b; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .item-content { flex: 1; }
        .item-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
        .item-meta { font-size: 0.7rem; color: var(--muted); }
        .item-side { text-align: right; }
        .item-price { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
        .item-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .act-btn { padding: 8px; background: #1e293b; border-radius: 10px; border: none; color: var(--primary); display: flex; align-items: center; }
        .act-btn.red { color: var(--down); }
        .act-btn.green { background: var(--up); color: black; padding: 6px 12px; font-weight: 700; font-size: 0.65rem; }

        /* Modal de Edição */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 2000; }
        .modal-content { background: #161b2c; padding: 25px; border-radius: 28px; width: 100%; max-width: 400px; border: 1px solid #1e293b; }

        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #0b0f1a; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 15px 5px 35px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; }
        .nav-item i { font-size: 1.4rem; }
        .nav-item span { font-size: 0.6rem; font-weight: 600; }
        .nav-item.active { color: #38bdf8; }
    </style>
</head>
<body>

<header>
    <div class='h-info'>
        <h1>Zapia Finance</h1>
        <p>Julho de 2026</p>
    </div>
</header>

<div class='summary-scroll'>
    <div class='s-card s-blue'>
        <span class='s-label' style='color:#38bdf8'>Saldo Total</span>
        <div class='s-val' id='balVal'>R$ 0,00</div>
    </div>
    <div class='s-card s-yellow'>
        <span class='s-label' style='color:var(--warn)'>Total Pendente</span>
        <div class='s-val' id='pendVal'>R$ 0,00</div>
    </div>
</div>

<div class='form-card'>
    <input type='text' id='addDesc' placeholder='Descrição (ex: Mercado)'>
    <div style='display:flex; gap:10px'>
        <input type='number' id='addVal' placeholder='R$ 0,00'>
        <select id='addTipo' style='width:130px'>
            <option value='desp'>Gasto</option>
            <option value='rec'>Ganho</option>
            <option value='pend'>Pendência</option>
        </select>
    </div>
    <button class='btn-add' onclick='handleSave()'>Adicionar Registro</button>
</div>

<h2 class='section-title'>Movimentações</h2>
<div class='list' id='mainList'></div>

<div class='modal' id='editModal'>
    <div class='modal-content'>
        <h3 style='margin-bottom:20px'>Editar Registro</h3>
        <input type='text' id='editDesc'>
        <input type='number' id='editVal'>
        <select id='editTipo'>
            <option value='desp'>Gasto</option>
            <option value='rec'>Ganho</option>
            <option value='pend'>Pendência</option>
        </select>
        <div style='display:flex; gap:10px; margin-top:10px'>
            <button class='btn-add' onclick='updateItem()'>Salvar Alterações</button>
            <button class='btn-add' style='background:#1e293b' onclick='closeModal()'>Cancelar</button>
        </div>
    </div>
</div>

<nav class='bottom-nav'>
    <a href='#' class='nav-item active'><i class='lucide-layout-grid'></i><span>Início</span></a>
    <a href='#' class='nav-item'><i class='lucide-clock'></i><span>Contas</span></a>
    <a href='#' class='nav-item'><i class='lucide-pie-chart'></i><span>Gráficos</span></a>
    <a href='#' class='nav-item'><i class='lucide-sparkles'></i><span>IA</span></a>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('zapia_pro_v6')) || [];
    let editingId = null;

    function persist() {
        localStorage.setItem('zapia_pro_v6', JSON.stringify(db));
        render();
    }

    function handleSave() {
        const desc = document.getElementById('addDesc').value;
        const val = parseFloat(document.getElementById('addVal').value);
        const tipo = document.getElementById('addTipo').value;
        if(!desc || isNaN(val)) return;

        db.unshift({ id: Date.now(), desc, val, tipo, date: new Date().toLocaleDateString('pt-BR') });
        document.getElementById('addDesc').value = '';
        document.getElementById('addVal').value = '';
        persist();
    }

    function openEdit(id) {
        const item = db.find(i => i.id === id);
        editingId = id;
        document.getElementById('editDesc').value = item.desc;
        document.getElementById('editVal').value = item.val;
        document.getElementById('editTipo').value = item.tipo;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function updateItem() {
        const item = db.find(i => i.id === editingId);
        item.desc = document.getElementById('editDesc').value;
        item.val = parseFloat(document.getElementById('editVal').value);
        item.tipo = document.getElementById('editTipo').value;
        closeModal();
        persist();
    }

    function deleteItem(id) {
        if(confirm('Deseja excluir este item?')) {
            db = db.filter(i => i.id !== id);
            persist();
        }
    }

    function payItem(id) {
        const item = db.find(i => i.id === id);
        item.tipo = 'desp';
        persist();
    }

    function render() {
        const list = document.getElementById('mainList');
        list.innerHTML = '';
        let bal = 0, pend = 0;

        db.forEach(i => {
            if(i.tipo === 'rec') bal += i.val;
            else if(i.tipo === 'desp') bal -= i.val;
            else if(i.tipo === 'pend') pend += i.val;

            const isPend = i.tipo === 'pend';
            const color = i.tipo === 'rec' ? 'var(--up)' : (isPend ? 'var(--warn)' : 'var(--down)');
            const icon = i.tipo === 'rec' ? 'lucide-trending-up' : (isPend ? 'lucide-clock' : 'lucide-trending-down');

            list.innerHTML += `
                <div class='item'>
                    <div class='item-icon' style='color:${color}'><i class='${icon}'></i></div>
                    <div class='item-content'>
                        <div class='item-title'>${i.desc}</div>
                        <div class='item-meta'>${i.date} • ${i.tipo.toUpperCase()}</div>
                    </div>
                    <div class='item-side'>
                        <div class='item-price' style='color:${color}'>R$ ${i.val.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
                        <div class='item-actions'>
                            ${isPend ? `<button class='act-btn green' onclick='payItem(${i.id})'>PAGAR</button>` : ''}
                            <button class='act-btn' onclick='openEdit(${i.id})'><i class='lucide-pencil' style='font-size:12px'></i></button>
                            <button class='act-btn red' onclick='deleteItem(${i.id})'><i class='lucide-trash-2' style='font-size:12px'></i></button>
                        </div>
                    </div>
                </div>
            `;
        });

        document.getElementById('balVal').innerText = 'R$ ' + bal.toLocaleString('pt-BR',{minimumFractionDigits:2});
        document.getElementById('pendVal').innerText = 'R$ ' + pend.toLocaleString('pt-BR',{minimumFractionDigits:2});
    }

    render();
</script>
</body>
</html>
