<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'>
    <title>Zapia Finance Pro - v8.0</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/icon?family=Material+Icons+Round' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2c; --primary: #3b82f6; --text: #f8fafc;
            --muted: #94a3b8; --up: #10b981; --down: #ef4444; --warn: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        
        header { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .h-info h1 { font-size: 1.4rem; font-weight: 700; }
        .h-info p { font-size: 0.8rem; color: var(--muted); }

        .tab-content { display: none; padding: 0 20px; animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #161b2c; padding: 20px; border-radius: 24px; border: 1px solid #1e293b; margin-bottom: 15px; }
        .c-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: block; }
        .c-val { font-size: 1.8rem; font-weight: 800; }

        /* Anual: Meses */
        .month-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .month-name { font-weight: 600; font-size: 0.9rem; }
        .month-vals { text-align: right; }
        .m-up { color: var(--up); font-size: 0.8rem; font-weight: 700; }
        .m-down { color: var(--down); font-size: 0.8rem; font-weight: 700; }

        /* Metas */
        .goal-item { margin-bottom: 20px; }
        .goal-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; }
        .goal-bar-bg { height: 10px; background: #1e293b; border-radius: 5px; overflow: hidden; }
        .goal-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        /* Simular */
        .sim-box { text-align: center; padding: 30px 20px; }
        .sim-result { font-size: 1.1rem; font-weight: 600; color: var(--text); margin: 20px 0; line-height: 1.6; }

        /* Inputs */
        input, select { width: 100%; padding: 16px; background: #0b0f1a; border: 1px solid #1e293b; border-radius: 12px; color: white; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #0b0f1a; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 15px 5px 35px; z-index: 1000; overflow-x: auto; scrollbar-width: none; }
        .nav-item { min-width: 60px; display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 0.6rem; font-weight: 600; }
        .nav-item.active { color: #38bdf8; }
        .nav-item i { font-size: 1.4rem; }
    </style>
</head>
<body>

<header>
    <div class='h-info'>
        <h1 id='viewTitle'>Lançar</h1>
        <p>Julho de 2026</p>
    </div>
</header>

<div id='view-lancar' class='tab-content active'>
    <div class='card'>
        <input type='text' id='fDesc' placeholder='O que é?'>
        <input type='number' id='fVal' placeholder='Valor R$'>
        <select id='fTipo'>
            <option value='desp'>Gasto</option>
            <option value='rec'>Ganho</option>
            <option value='pend'>Pendência</option>
        </select>
        <button class='btn-main' onclick='add()'>SALVAR</button>
    </div>
</div>

<div id='view-contas' class='tab-content'>
    <div class='card' style='border-color: var(--warn)'>
        <span class='c-label' style='color:var(--warn)'>Total Pendente</span>
        <div class='c-val' id='pTotal'>R$ 0,00</div>
    </div>
    <div id='pList'></div>
</div>

<div id='view-anual' class='tab-content'>
    <div class='card'>
        <span class='c-label'>Balanço do Ano</span>
        <div id='annualList'></div>
    </div>
</div>

<div id='view-metas' class='tab-content'>
    <div class='card'>
        <span class='c-label'>Nova Meta</span>
        <input type='text' id='mNome' placeholder='Nome da Meta (ex: Carro)'>
        <input type='number' id='mAlvo' placeholder='Valor Alvo R$'>
        <button class='btn-main' onclick='addMeta()'>CRIAR META</button>
    </div>
    <div id='metaList'></div>
</div>

<div id='view-simular' class='tab-content'>
    <div class='card sim-box'>
        <i class='lucide-scale' style='font-size: 3rem; color: var(--primary)'></i>
        <div class='sim-result' id='simText'>Carregando simulação...</div>
        <p style='font-size: 0.8rem; color: var(--muted)'>Esta simulação mostra como ficaria seu saldo se você pagasse todas as pendências hoje.</p>
    </div>
</div>

<nav class='bottom-nav'>
    <div class='nav-item active' onclick='switchTab("lancar")'><i class='lucide-layout-grid'></i><span>Lançar</span></div>
    <div class='nav-item' onclick='switchTab("contas")'><i class='lucide-clock'></i><span>Contas</span></div>
    <div class='nav-item' onclick='switchTab("anual")'><i class='lucide-calendar-days'></i><span>Anual</span></div>
    <div class='nav-item' onclick='switchTab("metas")'><i class='lucide-target'></i><span>Metas</span></div>
    <div class='nav-item' onclick='switchTab("simular")'><i class='lucide-scale'></i><span>Simular</span></div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('zapia_v8')) || { items: [], goals: [] };

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + t).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('viewTitle').innerText = t.charAt(0).toUpperCase() + t.slice(1);
        render();
    }

    function add() {
        const d = document.getElementById('fDesc').value, v = parseFloat(document.getElementById('fVal').value), t = document.getElementById('fTipo').value;
        if(!d || isNaN(v)) return;
        db.items.unshift({ id: Date.now(), desc: d, val: v, tipo: t, mes: 'Jul' });
        persist();
    }

    function addMeta() {
        const n = document.getElementById('mNome').value, a = parseFloat(document.getElementById('mAlvo').value);
        if(!n || isNaN(a)) return;
        db.goals.push({ id: Date.now(), nome: n, alvo: a, atual: 0 });
        persist();
    }

    function persist() { localStorage.setItem('zapia_v8', JSON.stringify(db)); render(); }

    function render() {
        let bal = 0, pnd = 0;
        const pList = document.getElementById('pList'); pList.innerHTML = '';
        db.items.forEach(i => {
            if(i.tipo === 'rec') bal += i.val; else if(i.tipo === 'desp') bal -= i.val; else if(i.tipo === 'pend') {
                pnd += i.val;
                pList.innerHTML += `<div class='card' style='display:flex; justify-content:space-between'><span>${i.desc}</span><b>R$ ${i.val}</b></div>`;
            }
        });
        document.getElementById('pTotal').innerText = 'R$ ' + pnd.toLocaleString();
        
        // Simular
        const simTotal = bal - pnd;
        document.getElementById('simText').innerHTML = `Seu saldo atual é <b>R$ ${bal.toLocaleString()}</b>.<br>Após pagar as pendências, restará:<br><span style='font-size:2rem; color:${simTotal<0?'var(--down)':'var(--up)'}'>R$ ${simTotal.toLocaleString()}</span>`;

        // Anual
        const aList = document.getElementById('annualList'); aList.innerHTML = '';
        ['Jan','Fev','Mar','Abr','Mai','Jun','Jul'].forEach(m => {
            let mRec = 0, mDesp = 0;
            db.items.filter(i => i.mes === m).forEach(i => { if(i.tipo==='rec') mRec+=i.val; else if(i.tipo==='desp') mDesp+=i.val; });
            aList.innerHTML += `<div class='month-row'><span>${m}</span><div class='month-vals'><div class='m-up'>+R$ ${mRec}</div><div class='m-down'>-R$ ${mDesp}</div></div></div>`;
        });

        // Metas
        const mList = document.getElementById('metaList'); mList.innerHTML = '';
        db.goals.forEach(g => {
            const perc = Math.min((bal > 0 ? (bal/g.alvo)*100 : 0), 100);
            mList.innerHTML += `<div class='goal-item'><div class='goal-header'><span>${g.nome}</span><span>R$ ${bal} / ${g.alvo}</span></div><div class='goal-bar-bg'><div class='goal-bar-fill' style='width:${perc}%'></div></div></div>`;
        });
    }
    render();
</script>
</body>
</html>
