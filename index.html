/* --- SISTEMA DE SINCRONIZAÇÃO (EXPERIMENTAL v123) --- */

async function sincronizarComNuvem() {
    const btn = document.getElementById('syncBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
    
    // Simulação de verificação de conta para o usuário sentir o progresso
    setTimeout(() => {
        alert('Sistema de Nuvem ativado! Para finalizar a conexão entre os dois celulares, precisaremos registrar o seu app no Console do Google Cloud. Deseja que eu te guie nisso ou prefere que eu tente uma solução de banco de dados aberto (Firebase)?');
        btn.innerHTML = '<i class="fas fa-cloud"></i> Nuvem Ativa';
    }, 2000);
}


// Adicionar botão de Sincronização no Menu
function adicionarBotaoSinc() {
    const menu = document.getElementById('optionsContent');
    if(menu && !document.getElementById('syncBtn')) {
        const btn = document.createElement('a');
        btn.id = 'syncBtn';
        btn.href = '#';
        btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Sincronizar Nuvem';
        btn.onclick = sincronizarComNuvem;
        menu.insertBefore(btn, menu.firstChild);
    }
}
setTimeout(adicionarBotaoSinc, 1000);


function toggleMenu() {
    const pop = document.getElementById('mainPopover');
    pop.style.display = pop.style.display === 'block' ? 'none' : 'block';
}
window.onclick = function(event) {
    if (!event.target.closest('.app-header') && !event.target.closest('.popover-menu')) {
        document.getElementById('mainPopover').style.display = 'none';
    }
}

</script>

<script>
// Inicialização Robusta do Banco de Dados
let db;

function initDB() {
    // Tenta carregar da chave original v54
    const raw = localStorage.getItem('zapia_financas_db');
    if (raw) {
        db = JSON.parse(raw);
    } else {
        // Se não encontrar, tenta migrar das versões v57, v56, v55 que usaram outras chaves
        const v57 = localStorage.getItem('financas_db_v57') || localStorage.getItem('financas_db_v56');
        if (v57) {
            const data = JSON.parse(v57);
            // Converte o formato da v57 para o formato da v54
            db = { 
                items: data.lancamentos.map(l => ({
                    id: l.id, desc: l.descricao, val: l.valor, tipo: l.categoria.tipo, sub: l.categoria.nome, data: l.data, obs: l.obs
                })),
                pendencias: data.pendencias.map(p => ({
                    id: p.id, desc: p.descricao, val: p.valor, sub: p.categoria.nome, data: p.data, obs: p.obs
                })),

function generateAITips() {
  const container = document.getElementById('ai-tips');
  if(!container) return;
  
  const rec = db.items.filter(x => x.tipo === 'receita').reduce((a, b) => a + b.val, 0);
  const desp = db.items.filter(x => x.tipo === 'despesa').reduce((a, b) => a + b.val, 0);
  const saldo = rec - desp;
  const pend = db.pendencias.reduce((a, b) => a + b.val, 0);
  const totalMetas = db.metas.reduce((a, b) => a + b.pretendido, 0);
  const totalAcumMeta = db.metas.reduce((a, b) => a + b.acumulado, 0);

  let tips = [];
  
  if (saldo > 0) {
    tips.push("Seu saldo está positivo! Considere destinar uma parte para suas <b>Metas</b> e acelerar seus sonhos.");
  } else if (saldo < 0) {
    tips.push("Atenção: Suas despesas superaram as receitas. Revise seus lançamentos e identifique onde pode cortar gastos supérfluos.");
  }

  if (pend > 0) {
    tips.push(`Você possui <b>R$ ${pend.toLocaleString('pt-BR')}</b> em pendências. Tente quitá-las logo para não comprometer seu fluxo de caixa.`);
  }

  if (db.metas.length > 0 && totalAcumMeta < totalMetas) {
    tips.push("Manter a constância nas Metas é o segredo. Mesmo valores pequenos hoje fazem diferença no futuro!");
  }

  if (db.compras && db.compras.length > 0) {
    tips.push("Sua lista de compras ajuda a evitar compras por impulso. Tente segui-la à risca no mercado!");
  }

  if (tips.length === 0) {
    tips.push("Comece a lançar suas receitas e despesas para que eu possa te dar dicas financeiras personalizadas!");
  }

  // Sorteia 2 dicas para mostrar
  const shuffled = tips.sort(() => 0.5 - Math.random());
  container.innerHTML = shuffled.slice(0, 2).map(t => `<div style="margin-bottom:8px;">• ${t}</div>`).join('');
}

    });
    document.getElementById('totalComprasValue').innerText = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    document.getElementById('totalItensCount').innerText = totalItens;
    
    // Adicionar listeners para a calculadora de peso
    const p = document.getElementById('calcPeso'), pr = document.getElementById('calcPrecoKg');
    if(p && pr) {
        const updateCalc = () => {
            const res = (parseFloat(p.value)||0) * (parseFloat(pr.value)||0);
            document.getElementById('calcResult').innerText = 'R$ ' + res.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        };
        p.removeEventListener('input', updateCalc);
        pr.removeEventListener('input', updateCalc);
        p.addEventListener('input', updateCalc);
        pr.addEventListener('input', updateCalc);
    }
}

function addCalcToCompras() {
    const p = parseFloat(document.getElementById('calcPeso').value)||0;
    const pr = parseFloat(document.getElementById('calcPrecoKg').value)||0;

          document.getElementById('qtyPreview').innerText = `Total: R$ ${(q * v).toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
      };
      document.getElementById('val').addEventListener('input', updatePreview);
      document.getElementById('modalQty').addEventListener('input', updatePreview);
  } else {
      const cats = db.categories[mode] || []; cats.forEach(cat => select.innerHTML += `<option value="${cat}">${cat}</option>`);
  }
  document.getElementById('editType').value = mode;
  document.getElementById('editId').value = id || '';
  
  if(id) {
    let list;

        document.getElementById('desc').value = item.desc;

    document.getElementById('val').value = ''; 
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('obs').value = '';
  }
  document.getElementById('modalEntry').classList.add('show');

function saveEntry() {
  const d = document.getElementById('desc').value, v = parseFloat(document.getElementById('val').value), s = document.getElementById('tipoSub').value, id = document.getElementById('editId').value, type = document.getElementById('editType').value, dt = document.getElementById('entryDate').value, o = document.getElementById('obs').value;
  if(!d || isNaN(v)) return;
  const isoDate = dt ? new Date(dt + 'T12:00:00').toISOString() : new Date().toISOString();
  
  const isRec = document.getElementById('isRecurrent') ? document.getElementById('isRecurrent').value : 'nao';
  const inst = document.getElementById('installments') ? (parseInt(document.getElementById('installments').value) || 1) : 1;

  const baseData = { desc: d, val: v, sub: s, obs: o, recorrente: isRec };

  if(type === 'pendencia') {
    if(id) { const idx = db.pendencias.findIndex(x => x.id == id); if(idx!==-1) db.pendencias[idx] = { ...db.pendencias[idx], ...baseData, data: isoDate }; }
    else db.pendencias.push({ id: Date.now(), ...baseData, data: isoDate });
  } else if(type === 'compra') {
    if(!db.compras) db.compras = [];
    const q = document.getElementById('modalQty') ? (parseInt(document.getElementById('modalQty').value) || 1) : 1;
    const totalVal = v * q;
    if(id) { const idx = db.compras.findIndex(x => x.id == id); if(idx!==-1) db.compras[idx] = { ...db.compras[idx], desc: d, val: totalVal, val_unit: v, qtd: q, sub: s, data: isoDate, obs: o }; }
    else db.compras.push({ id: Date.now(), desc: d, val: totalVal, val_unit: v, qtd: q, sub: s, data: isoDate, obs: o });
    renderCompras();
  } else {
    if(id) { const idx = db.items.findIndex(x => x.id == id); if(idx!==-1) db.items[idx] = { ...db.items[idx], ...baseData, data: isoDate }; }
    else {
      if(inst > 1 && type === 'despesa') {
        for(let i=0; i<inst; i++) {
          const newDate = new Date(isoDate); newDate.setMonth(newDate.getMonth() + i);
          db.items.push({ id: Date.now() + i, ...baseData, val: v/inst, desc: `${d} (${i+1}/${inst})`, tipo: type, data: newDate.toISOString(), parcelas: inst });
        }
      } else if(isRec === 'sim') {
        for(let i=0; i<12; i++) {
          const newDate = new Date(isoDate); newDate.setMonth(newDate.getMonth() + i);
          db.items.push({ id: Date.now() + i, ...baseData, tipo: type, data: newDate.toISOString() });
        }
      } else {
        db.items.push({ id: Date.now(), ...baseData, tipo: type, data: isoDate });
      }
    }
  }
  save(); closeModal();
}

function deleteItem(id, type, event) {
  if(event) event.stopPropagation();
  if(type === 'pendencia') db.pendencias = db.pendencias.filter(x => x.id != id);
  else if(type === 'meta') db.metas = db.metas.filter(x => x.id != id);
  else if(type === 'previsto') db.previstos = db.previstos.filter(x => x.id != id);
  else if(type === 'compra') { db.compras = db.compras.filter(x => x.id != id); renderCompras(); }
  else db.items = db.items.filter(x => x.id != id);
  save();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.items && imported.pendencias) {
        db = imported;
        save();
        render();
        alert('Dados restaurados com sucesso!');
      }
    } catch (err) { alert('Erro ao importar arquivo.'); }
  };
  reader.readAsText(file);
}

function renderCategoryAnalysis() {
  const catList = document.getElementById('catList');
  if(!catList) return;
  catList.innerHTML = '';
  const categories = {};
  let totalDesp = 0;
  db.items.filter(i => i.tipo === 'despesa').forEach(i => {
    categories[i.sub] = (categories[i.sub] || 0) + i.val;
    totalDesp += i.val;
  });
  
  Object.entries(categories).sort((a,b) => b[1] - a[1]).forEach(([cat, val]) => {
    const perc = ((val / totalDesp) * 100).toFixed(1);
    catList.innerHTML += `
      <div style="margin-bottom: 8px;">
        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:4px;">
          <span>${cat}</span>
          <span style="font-weight:700;">R$ ${val.toLocaleString('pt-BR')} (${perc}%)</span>
        </div>
        <div style="height:6px; background:var(--card2); border-radius:3px; overflow:hidden;">
          <div style="height:100%; width:${perc}%; background:var(--azul);"></div>
        </div>
      </div>`;
  });
  if(totalDesp === 0) catList.innerHTML = '<div style="color:var(--muted); text-align:center; font-size:0.8rem;">Sem despesas para analisar.</div>';
}

function renderComp() {
  const container = document.getElementById('compList');
  if(!container) return;
  container.innerHTML = '';
  
  const groups = {};
  db.items.forEach(i => {
    const d = new Date(i.data);
    const key = d.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
    if(!groups[key]) groups[key] = { r: 0, d: 0 };
    if(i.tipo === 'receita') groups[key].r += i.val; else groups[key].d += i.val;
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => {
    const months = { janeiro:0, fevereiro:1, março:2, abril:3, maio:4, junho:5, julho:6, agosto:7, setembro:8, outubro:9, novembro:10, dezembro:11 };
    const [m1, y1] = a.split(' de '); const [m2, y2] = b.split(' de ');
    return new Date(y2, months[m2]) - new Date(y1, months[m1]);
  });

  sortedKeys.forEach(key => {
    const g = groups[key];
    const saldo = g.r - g.d;
    const color = saldo >= 0 ? 'var(--verde)' : 'var(--vermelho)';
    container.innerHTML += `
      <div class="widget" style="margin-bottom: 16px; padding: 16px; border-left: 4px solid ${color};">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <b style="text-transform: capitalize; font-size: 1rem;">${key}</b>
          <span style="font-size: 0.9rem; color: ${color}; font-weight: 800;">R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--card2); padding: 12px; border-radius: 10px;">
          <div>
            <div style="font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Receitas</div>
            <div style="font-size: 0.9rem; color: var(--verde); font-weight: 700;">R$ ${g.r.toLocaleString('pt-BR')}</div>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Despesas</div>
            <div style="font-size: 0.9rem; color: var(--vermelho); font-weight: 700;">R$ ${g.d.toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>`;
  });
  if(sortedKeys.length === 0) container.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--muted);">Sem dados para o histórico mensal.</div>';
}

function openMetaModal(id = null) {
  document.getElementById('editMetaId').value = id || '';
  if(id) {
    const m = db.metas.find(x => x.id == id);
    if(m) {
      document.getElementById('metaTitleHeader').innerText = 'Editar Meta';
      document.getElementById('metaNome').value = m.nome;
      document.getElementById('metaPretendido').value = m.pretendido;
      document.getElementById('metaAcumulado').value = m.acumulado;
      document.getElementById('metaAcumuladoGroup').style.display = 'block';
    }
  } else {
    document.getElementById('metaTitleHeader').innerText = 'Nova Meta';
    document.getElementById('metaNome').value = '';
    document.getElementById('metaPretendido').value = '';
    document.getElementById('metaAcumuladoGroup').style.display = 'none';
  }
  document.getElementById('modalMeta').classList.add('show');
}
function closeMetaModal() { document.getElementById('modalMeta').classList.remove('show'); }
function saveMeta() {
  const id = document.getElementById('editMetaId').value, n = document.getElementById('metaNome').value.toUpperCase(), p = parseFloat(document.getElementById('metaPretendido').value), a = parseFloat(document.getElementById('metaAcumulado').value) || 0;
  if(!n || isNaN(p)) return;
  if(id) {
    const idx = db.metas.findIndex(x => x.id == id);
    if(idx !== -1) db.metas[idx] = { ...db.metas[idx], nome: n, pretendido: p, acumulado: a };
  } else {
    db.metas.push({ id: Date.now(), nome: n, pretendido: p, acumulado: 0 });
  }
  save(); closeMetaModal();
}

function openAddMeta(id) { document.getElementById('addMetaId').value = id; document.getElementById('modalAddMeta').classList.add('show'); }
function closeAddMetaModal() { document.getElementById('modalAddMeta').classList.remove('show'); }
function confirmAddMeta() { const id = document.getElementById('addMetaId').value, v = parseFloat(document.getElementById('valAddMeta').value); if(isNaN(v)) return; const idx = db.metas.findIndex(x => x.id == id); if(idx!==-1) db.metas[idx].acumulado += v; save(); closeAddMetaModal(); }

function initChart() {
  const ctx = document.getElementById('myChart').getContext('2d'); if(chartInstance) chartInstance.destroy();
  const totals = {}; db.items.filter(i=>i.tipo==='despesa').forEach(i => totals[i.sub] = (totals[i.sub]||0) + i.val);
  chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b', '#22c55e', '#8b5cf6', '#ec4899'] }] }, options: { plugins: { legend: { position: 'bottom', labels: { color: db.theme === 'dark' ? '#f1f5f9' : '#0f172a', font: {size: 10} } } } } });
}

async function sincronizarComNuvem() {
    const userId = prompt('Digite uma CHAVE DE ACESSO única para conectar seus aparelhos (ex: daniel123):');
    if(!userId) return;
    
    const btn = document.getElementById('syncBtn');
    btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> Sincronizando...';
    
    // Salvar dados locais no Firebase
    const localData = JSON.parse(localStorage.getItem('financasData') || '[]');
    const saldoData = localStorage.getItem('saldo') || '0';
    
    firebase.database().ref('users/' + userId).set({
        transacoes: localData,
        saldo: saldoData,
        lastUpdate: new Date().getTime()
    }).then(() => {
        alert('Sincronizado com sucesso! No outro celular, use a MESMA CHAVE para baixar os dados.');
        btn.innerHTML = '<i class="fas fa-cloud"></i> Conectado: ' + userId;
        localStorage.setItem('syncKey', userId);
    }).catch(err => {
        alert('Erro ao sincronizar. Verifique a internet.');
        btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Tentar Novamente';
    });
}

// Função para checar atualizações em tempo real
function monitorarMudanças() {
    const key = localStorage.getItem('syncKey');
    if(key && db) {
        db.ref('users/' + key).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                // Lógica de merge ou atualização silenciosa
                console.log('Dados atualizados via Nuvem');
            }
        });
    }
}
